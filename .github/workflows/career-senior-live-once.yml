name: Career Senior Live Verification Once

on:
  push:
    branches:
      - career-senior-live-verify
    paths:
      - 'career-explorer/LIVE_VERIFY.trigger'

permissions:
  contents: write

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout verification branch
        uses: actions/checkout@v4
        with:
          ref: career-senior-live-verify
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify public career routes
        env:
          LIVE_BASE_URL: https://4th-season.com
          LIVE_RESULT_PATH: /tmp/career-senior-live-result.json
          LIVE_SCREENSHOT_PATH: /tmp/career-senior-live.png
          LIVE_MAX_ATTEMPTS: '36'
          LIVE_DELAY_MS: '10000'
        run: node career-explorer/senior/tests/live.mjs

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: career-senior-live-evidence-once
          path: |
            /tmp/career-senior-live-result.json
            /tmp/career-senior-live.png
          if-no-files-found: error
          retention-days: 14

      - name: Record verified deployment on main
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python3 - <<'PY'
          from pathlib import Path
          import json
          import subprocess
          result = json.loads(Path('/tmp/career-senior-live-result.json').read_text(encoding='utf-8'))
          sha = subprocess.check_output(['git','rev-parse','HEAD'], text=True).strip()
          content = f'''# 공개 배포 검증 완료

- 검증 시각(UTC): `{result['verifiedAt']}`
- 기준 커밋: `{sha}`
- 시니어 직접 경로: `{result['seniorDirect']}`
- 시니어 통합 경로: `{result['seniorIntegrated']}`
- 청소년 기존 경로: `{result['youth']}`
- 결과: 3개 전환 경로·9개 직업 생성 확인
- 상태: 통과
'''
          Path('career-explorer/senior/LIVE_DEPLOYED.md').write_text(content, encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add career-explorer/senior/LIVE_DEPLOYED.md
          if ! git diff --cached --quiet; then
            git commit -m 'Record verified senior career deployment'
            git push origin main
          fi
