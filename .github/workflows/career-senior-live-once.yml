name: Career Senior Live Verification Once

on:
  push:
    branches:
      - career-senior-live-verify
    paths:
      - 'career-explorer/LIVE_VERIFY.trigger'

permissions:
  contents: write

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout verification branch
        uses: actions/checkout@v4
        with:
          ref: career-senior-live-verify
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify public career routes and preserve outcome
        env:
          LIVE_BASE_URL: https://4th-season.com
          LIVE_RESULT_PATH: /tmp/career-senior-live-result.json
          LIVE_SCREENSHOT_PATH: /tmp/career-senior-live.png
          LIVE_MAX_ATTEMPTS: '18'
          LIVE_DELAY_MS: '10000'
        run: |
          set +e
          node career-explorer/senior/tests/live.mjs 2>&1 | tee /tmp/career-senior-live.log
          code=${PIPESTATUS[0]}
          echo "$code" > /tmp/career-senior-live-exit-code
          exit 0

      - name: Upload evidence and diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: career-senior-live-evidence-once
          path: |
            /tmp/career-senior-live-result.json
            /tmp/career-senior-live.png
            /tmp/career-senior-live.log
            /tmp/career-senior-live-exit-code
          if-no-files-found: warn
          retention-days: 14

      - name: Record deployment outcome on main
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python3 - <<'PY'
          from pathlib import Path
          import json
          import subprocess
          from datetime import datetime, timezone

          sha = subprocess.check_output(['git','rev-parse','HEAD'], text=True).strip()
          result_path = Path('/tmp/career-senior-live-result.json')
          log_path = Path('/tmp/career-senior-live.log')
          exit_path = Path('/tmp/career-senior-live-exit-code')
          exit_code = exit_path.read_text(encoding='utf-8').strip() if exit_path.exists() else 'unknown'

          if result_path.exists() and exit_code == '0':
              result = json.loads(result_path.read_text(encoding='utf-8'))
              content = f'''# 공개 배포 검증 완료

- 검증 시각(UTC): `{result['verifiedAt']}`
- 기준 커밋: `{sha}`
- 시니어 직접 경로: `{result['seniorDirect']}`
- 시니어 통합 경로: `{result['seniorIntegrated']}`
- 청소년 기존 경로: `{result['youth']}`
- 결과: 3개 전환 경로·9개 직업 생성 확인
- 상태: 통과
'''
          else:
              checked_at = datetime.now(timezone.utc).isoformat()
              log = log_path.read_text(encoding='utf-8', errors='replace') if log_path.exists() else '검증 로그 없음'
              tail = log[-6000:].replace('```', "'''")
              content = f'''# 공개 배포 검증 미통과

- 검증 시각(UTC): `{checked_at}`
- 기준 커밋: `{sha}`
- 종료 코드: `{exit_code}`
- 상태: 미통과

## 마지막 검증 로그

```text
{tail}
```
'''

          Path('career-explorer/senior/LIVE_DEPLOYED.md').write_text(content, encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add career-explorer/senior/LIVE_DEPLOYED.md
          if ! git diff --cached --quiet; then
            git commit -m 'Record senior career live verification outcome'
            git push origin main
          fi
