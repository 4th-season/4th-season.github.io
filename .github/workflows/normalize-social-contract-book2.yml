name: Normalize Social Contract Book II

on:
  push:
    branches:
      - feat/social-contract-reread
    paths:
      - '.github/workflows/normalize-social-contract-book2.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/social-contract-reread
          fetch-depth: 0

      - name: Normalize titles, terminology, labels, and reports
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          root = Path('reread/social-contract')

          replacements = {
              'book-02-chapter-01.html': [
                  ('제2권 제1장 주권은 양도될 수 없다', '제2권 제1장 주권은 양도할 수 없다'),
              ],
              'book-02-chapter-02.html': [
                  ('제2권 제2장 주권은 분할될 수 없다', '제2권 제2장 주권은 분할할 수 없다'),
              ],
              'book-02-chapter-04.html': [
                  ('한국어 전문번역', '한국어 자체 번역'),
                  ('전문번역 문단 대응판', '자체 번역 문단 대응판'),
                  ('전문번역 문단 대응판 v1.0', '자체 번역 문단 대응 교정판 v1.0.0'),
              ],
              'book-02-chapter-05.html': [
                  ('제2권 제5장 생사권', '제2권 제5장 생사에 관한 권리'),
                  ('한국어 전문번역', '한국어 자체 번역'),
                  ('전문번역 문단 대응판', '자체 번역 문단 대응판'),
                  ('전문번역 문단 대응판 v1.0', '자체 번역 문단 대응 교정판 v1.0.0'),
              ],
              'book-02-chapter-06.html': [
                  ('한국어 전문번역', '한국어 자체 번역'),
                  ('전문번역 문단 대응판', '자체 번역 문단 대응판'),
                  ('전문번역 문단 대응판 v1.0', '자체 번역 문단 대응 교정판 v1.0.0'),
                  ('전체 국민', '전체 인민'),
                  ('국민이며', '인민이며'),
                  ('국민은', '인민은'),
              ],
              'book-02-chapter-07.html': [
                  ('한국어 전문번역', '한국어 자체 번역'),
                  ('전문번역 문단 대응판', '자체 번역 문단 대응판'),
                  ('전문번역 문단 대응판 v1.0', '자체 번역 문단 대응 교정판 v1.0.0'),
                  ('한 민족에게', '한 인민에게'),
                  ('국민이', '인민이'),
                  ('국민을', '인민을'),
              ],
              'book-02-chapter-08.html': [
                  ('제2권 제8장 국민', '제2권 제8장 인민'),
                  ('한국어 전문번역', '한국어 자체 번역'),
                  ('전문번역 문단 대응판', '자체 번역 문단 대응판'),
                  ('전문번역 문단 대응판 v1.0', '자체 번역 문단 대응 교정판 v1.0.0'),
                  ('국민에게', '인민에게'),
                  ('국민이', '인민이'),
                  ('국민은', '인민은'),
                  ('국민도', '인민도'),
              ],
              'book-02-chapter-09.html': [
                  ('제2권 제9장 국민—계속', '제2권 제9장 인민(계속)'),
                  ('한국어 전문번역', '한국어 자체 번역'),
                  ('전문번역 문단 대응판', '자체 번역 문단 대응판'),
                  ('전문번역 문단 대응판 v1.0', '자체 번역 문단 대응 교정판 v1.0.0'),
                  ('국민은', '인민은'),
                  ('국민에게', '인민에게'),
                  ('국민이', '인민이'),
                  ('국민의', '인민의'),
              ],
          }

          changed = []
          for filename, pairs in replacements.items():
              path = root / filename
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(filename)

          index_path = root / 'index.html'
          index_text = index_path.read_text(encoding='utf-8')
          index_pairs = [
              ('<strong>주권은 양도할 수 없다</strong>', '<strong>주권은 양도할 수 없다</strong>'),
              ('<strong>주권은 분할할 수 없다</strong>', '<strong>주권은 분할할 수 없다</strong>'),
              ('<strong>생사에 관한 권리</strong>', '<strong>생사에 관한 권리</strong>'),
              ('<strong>국민</strong><span>The People</span>', '<strong>인민</strong><span>The People</span>'),
              ('<strong>국민(계속)</strong><span>The People (continued)</span>', '<strong>인민(계속)</strong><span>The People (continued)</span>'),
          ]
          original_index = index_text
          for old, new in index_pairs:
              index_text = index_text.replace(old, new)
          if index_text != original_index:
              index_path.write_text(index_text, encoding='utf-8')
              changed.append('index.html')

          report_path = root / 'paragraph-mapping-report.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          report['summary']['result'] = 'PASS'
          for chapter in report['chapters']:
              chapter['terminology_checked'] = True
              chapter['result'] = 'PASS'
              if chapter['chapter'] in {1,2,4,5,6,7,8,9}:
                  chapter['notes'] = ['W02-D5-R 제목·용어·화면 라벨 정규화 완료']
          report['editorial_follow_up'] = []
          report['normalization'] = {
              'task': 'W02-D5-R',
              'completed': True,
              'scope': [
                  '제1·2·5장 제목을 SOURCE_MANIFEST 기준으로 통일',
                  '제4~9장 화면 라벨을 한국어 자체 번역으로 통일',
                  '제6·8·9장 people 번역을 인민 기준으로 정합화',
                  '제8·9장 제목을 인민 표기로 통일'
              ]
          }
          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          changed.append('paragraph-mapping-report.json')

          workplan_path = root / 'WORKPLAN.md'
          workplan = workplan_path.read_text(encoding='utf-8')
          marker = '### W02-D5-R — 완료'
          if marker not in workplan:
              addition = '''\n\n### W02-D5-R — 완료\n\n- 제1·2·5장 제목을 SOURCE_MANIFEST 기준으로 통일\n- 제4~9장 화면 라벨을 `한국어 자체 번역`으로 통일\n- 제6·8·9장 `people` 번역을 `인민` 기준으로 정합화\n- 제8·9장 제목을 `인민`, `인민(계속)`으로 통일\n- `paragraph-mapping-report.json` 최종 결과를 `PASS`로 갱신\n\n### 다음 작업\n\n- W03-D1: 제3권 제1~3장 영문 분리, 한국어 자체 번역, 문단 대응 HTML 제작\n'''
              if '### 다음 작업' in workplan:
                  head, _, _tail = workplan.partition('### 다음 작업')
                  workplan = head.rstrip() + addition
              else:
                  workplan = workplan.rstrip() + addition
              workplan_path.write_text(workplan + '\n', encoding='utf-8')
              changed.append('WORKPLAN.md')

          print('Changed:', ', '.join(changed))
          PY

      - name: Validate normalization
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          root = Path('reread/social-contract')
          failures = []
          expected = {
              'book-02-chapter-01.html': '제2권 제1장 주권은 양도할 수 없다',
              'book-02-chapter-02.html': '제2권 제2장 주권은 분할할 수 없다',
              'book-02-chapter-05.html': '제2권 제5장 생사에 관한 권리',
              'book-02-chapter-08.html': '제2권 제8장 인민',
              'book-02-chapter-09.html': '제2권 제9장 인민(계속)',
          }
          for name, phrase in expected.items():
              text = (root / name).read_text(encoding='utf-8')
              if phrase not in text:
                  failures.append(f'{name}: title mismatch')

          for n in range(4, 10):
              text = (root / f'book-02-chapter-{n:02d}.html').read_text(encoding='utf-8')
              if '한국어 전문번역' in text:
                  failures.append(f'chapter {n}: old label remains')
              if '한국어 자체 번역' not in text:
                  failures.append(f'chapter {n}: new label missing')

          for n in (6, 8, 9):
              text = (root / f'book-02-chapter-{n:02d}.html').read_text(encoding='utf-8')
              if '국민' in text:
                  failures.append(f'chapter {n}: 국민 remains')

          report = json.loads((root / 'paragraph-mapping-report.json').read_text(encoding='utf-8'))
          if report['summary']['result'] != 'PASS':
              failures.append('report result is not PASS')
          if report.get('editorial_follow_up'):
              failures.append('editorial follow-up is not empty')

          if failures:
              raise SystemExit('\n'.join(failures))
          print('Normalization validation: PASS')
          PY

      - name: Commit normalized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reread/social-contract
          if git diff --cached --quiet; then
            echo "No normalization changes to commit."
          else
            git commit -m "Normalize Social Contract Book II terminology and labels"
            git push origin HEAD:feat/social-contract-reread
          fi
