name: Career Senior S11 Integration

on:
  push:
    branches:
      - career-senior-s09
    paths:
      - 'career-explorer/S11_INTEGRATE.trigger'

permissions:
  contents: write

jobs:
  integrate-senior-route:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Add senior query route and publish indexing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          youth_path = Path('career-explorer/index.html')
          senior_path = Path('career-explorer/senior/index.html')
          trigger_path = Path('career-explorer/S11_INTEGRATE.trigger')

          youth = youth_path.read_text(encoding='utf-8')
          marker = 'id="career-senior-route"'
          if marker not in youth:
              route_script = '''  <script id="career-senior-route">
            (() => {
              const params = new URLSearchParams(location.search);
              if (params.get("audience") !== "senior") return;
              const target = new URL("./senior/", location.href);
              const start = params.get("start");
              if (start) target.searchParams.set("start", start);
              location.replace(target.href);
            })();
            </script>
          '''
              youth = youth.replace('<head>\n', '<head>\n' + route_script, 1)
              youth_path.write_text(youth, encoding='utf-8')

          senior = senior_path.read_text(encoding='utf-8')
          senior = senior.replace(
              '<meta name="robots" content="noindex,nofollow">',
              '<meta name="robots" content="index,follow">',
              1,
          )
          senior_path.write_text(senior, encoding='utf-8')

          if trigger_path.exists():
              trigger_path.unlink()

          if marker not in youth_path.read_text(encoding='utf-8'):
              raise SystemExit('senior audience router was not inserted')
          if 'content="index,follow"' not in senior_path.read_text(encoding='utf-8'):
              raise SystemExit('senior page indexing setting was not updated')
          PY

      - name: Commit integrated route
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add career-explorer/index.html career-explorer/senior/index.html career-explorer/S11_INTEGRATE.trigger
          git commit -m 'Integrate senior career route and indexing'
          git push origin HEAD:${{ github.ref_name }}
