name: Remap The Prince paragraphs

on:
  push:
    branches:
      - fix/the-prince-paragraph-mapping
    paths:
      - 'scripts/remap_the_prince.py'
      - 'reread/the-prince/**'
      - '.github/workflows/remap-the-prince.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/the-prince-paragraph-mapping
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Rebuild and validate paragraph pairs
        run: python scripts/remap_the_prince.py
      - name: Commit regenerated chapters
        run: |
          if git diff --quiet; then
            echo 'No changes generated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reread/the-prince
          git commit -m 'Rebuild The Prince EN-KO paragraph mapping'
          git push origin HEAD:fix/the-prince-paragraph-mapping
