name: Build Social Contract Book I

on:
  push:
    branches:
      - feat/social-contract-reread
    paths:
      - 'scripts/install_social_contract_book1.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/social-contract-reread
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate Book I pages and report
        run: python scripts/install_social_contract_book1.py
      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reread/social-contract
          git commit -m 'Build Social Contract Book I bilingual pages'
          git push origin HEAD:feat/social-contract-reread
