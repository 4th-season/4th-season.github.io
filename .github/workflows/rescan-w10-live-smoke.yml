name: ReScan W10 Live Smoke

on:
  push:
    branches: [main]
    paths:
      - 'rescan/**'
      - 'sitemap.xml'
      - '.github/workflows/rescan-w10-live-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rescan-w10-live-smoke
  cancel-in-progress: true

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: https://4th-season.com
      DEPLOY_ATTEMPTS: '24'
      DEPLOY_DELAY_MS: '10000'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run live Re:Scan browser smoke test
        run: node rescan/tests/w10-live-smoke.mjs

      - name: Upload smoke-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rescan-w10-live-smoke-${{ github.run_number }}
          path: rescan/tests/artifacts/
          if-no-files-found: warn
          retention-days: 14
