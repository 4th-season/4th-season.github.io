name: ReScan W11 Live Smoke

on:
  push:
    branches: [main]
    paths:
      - 'rescan/**'
      - 'sitemap.xml'
      - '.github/workflows/rescan-w11-live-smoke.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rescan/**'
      - 'sitemap.xml'
      - '.github/workflows/rescan-w11-live-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rescan-w11-live-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: https://4th-season.com
      DEPLOY_ATTEMPTS: '24'
      DEPLOY_DELAY_MS: '10000'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate W11 reviewed content
        run: node rescan/tests/w11-content-review-static.mjs
      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Run W11 live browser smoke test
        run: node rescan/tests/w11-live-smoke.mjs
      - name: Upload W11 smoke-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rescan-w11-live-smoke-${{ github.run_number }}
          path: rescan/tests/artifacts-w11/
          if-no-files-found: warn
          retention-days: 14
