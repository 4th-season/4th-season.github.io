<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Re:Scan 삶의 만족도 조건형 해설 QA</title>
  <style>
    body{margin:0;background:#f5f2f7;color:#2f2934;font-family:Arial,"Noto Sans KR",sans-serif;line-height:1.6}.wrap{width:min(920px,calc(100% - 32px));margin:40px auto}.panel{padding:28px;border:1px solid #d9cedf;border-radius:20px;background:#fff;box-shadow:0 12px 30px rgba(54,39,66,.07)}h1{margin-top:0}.summary{font-size:1.1rem;font-weight:800}.pass{color:#246b43}.fail{color:#a33030}table{width:100%;border-collapse:collapse;margin-top:20px}th,td{padding:11px;border-bottom:1px solid #e6dfe9;text-align:left;font-size:.92rem}code{font-size:.88rem}
  </style>
</head>
<body>
  <main class="wrap"><section class="panel"><h1>삶의 만족도 조건형 해설 QA</h1><p>16개 대표 응답과 전체 안정 동률 사례에서 카드 선택 결과를 확인합니다.</p><p id="summary" class="summary">검사 중…</p><table><thead><tr><th>사례</th><th>예상</th><th>실제</th><th>판정</th></tr></thead><tbody id="results"></tbody></table></section></main>
  <script src="/rescan/assets/js/scoring.js"></script>
  <script src="/rescan/assets/js/guidance-engine.js"></script>
  <script>
    (async () => {
      const [checklist, guidance] = await Promise.all([
        fetch('/rescan/data/checklists/life-satisfaction.json', {cache:'no-store'}).then((r)=>r.json()),
        fetch('/rescan/data/guidance/life-satisfaction.json', {cache:'no-store'}).then((r)=>r.json())
      ]);
      const stable={ls01:3,ls02:3,ls03:3,ls04:3,ls05:0,ls06:0,ls07:0,ls08:3,ls09:3,ls10:0,ls11:3,ls12:0};
      const cases={
        'ls-daily-01':{ls01:1,ls05:2,ls09:1},'ls-daily-02':{ls01:2,ls05:2,ls09:1},'ls-daily-03':{ls01:1,ls05:1,ls09:2},'ls-daily-04':{ls01:2,ls05:1,ls09:2},
        'ls-relationship-01':{ls02:1,ls06:2,ls10:2},'ls-relationship-02':{ls02:2,ls06:2,ls10:2},'ls-relationship-03':{ls02:2,ls06:1,ls10:2},'ls-relationship-04':{ls02:2,ls06:1,ls10:1},
        'ls-activity-01':{ls03:2,ls07:2,ls11:3},'ls-activity-02':{ls03:1,ls07:1,ls11:1},'ls-activity-03':{ls03:1,ls07:2,ls11:1},'ls-activity-04':{ls03:2,ls07:1,ls11:2},
        'ls-direction-01':{ls04:1,ls08:2,ls12:2},'ls-direction-02':{ls04:2,ls08:1,ls12:2},'ls-direction-03':{ls04:1,ls08:2,ls12:1},'ls-direction-04':{ls04:1,ls08:1,ls12:2}
      };
      const rows=[];
      for(const [expected,patch] of Object.entries(cases)){
        const answers={...stable,...patch};
        const calculation=window.ReScanScoring.calculate(checklist,answers);
        const actual=window.ReScanGuidance.selectCard(guidance,calculation,answers)?.id||'none';
        rows.push({name:expected,expected,actual,pass:actual===expected});
      }
      const stableCalculation=window.ReScanScoring.calculate(checklist,stable);
      const stableActual=window.ReScanGuidance.selectCard(guidance,stableCalculation,stable)?.id||'none';
      rows.push({name:'전체 안정 동률',expected:'none',actual:stableActual,pass:stableActual==='none'});
      document.querySelector('#results').innerHTML=rows.map((row)=>`<tr><td><code>${row.name}</code></td><td><code>${row.expected}</code></td><td><code>${row.actual}</code></td><td class="${row.pass?'pass':'fail'}">${row.pass?'PASS':'FAIL'}</td></tr>`).join('');
      const passed=rows.filter((row)=>row.pass).length;
      const summary=document.querySelector('#summary');summary.textContent=`${passed}/${rows.length} 통과`;summary.className=`summary ${passed===rows.length?'pass':'fail'}`;
    })().catch((error)=>{const summary=document.querySelector('#summary');summary.textContent=`실행 오류: ${error.message}`;summary.className='summary fail';});
  </script>
</body>
</html>
