<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>인터넷 ID와 정체성 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p><a href="../">← 본문으로</a></p><h1>인터넷 ID와 정체성</h1><p>인터넷 ID는 단순한 접속 이름일 수도 있고, 사용자가 지속적으로 활동하며 형성한 자기 표현의 일부일 수도 있습니다.</p><h2>두 가지 읽기</h2><div class="box"><strong>정체성의 일부</strong><p>ID에 축적된 활동과 평판이 사용자의 자기 정체성과 연결됩니다.</p></div><div class="box"><strong>구별 장치</strong><p>ID는 사용자를 가상 공간에서 구분하는 표시에 불과하며 실제 개인과 동일하지 않습니다.</p></div><h2>문해력 기준</h2><p>선택지에서 ID와 개인을 바로 같은 것으로 처리하는지, 둘을 구별하는지 먼저 확인하세요. 이 전제가 달라지면 공격의 대상과 법적 책임 판단도 달라집니다.</p></article></main></body></html>
