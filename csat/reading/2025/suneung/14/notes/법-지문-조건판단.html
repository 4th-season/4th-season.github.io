<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>법 지문 조건 판단 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p><a href="../">← 본문으로</a></p><h1>법 지문 조건 판단</h1><p>법 지문은 결론만 외우지 말고 어떤 조건이 충족될 때 그 결론이 나오는지 추적해야 합니다.</p><div class="box"><strong>1. 주체</strong><p>누가 보호받고 누가 책임지는가.</p></div><div class="box"><strong>2. 요건</strong><p>피해자 특정, 공격 내용, 제3자의 인식 가능성처럼 필요한 조건은 무엇인가.</p></div><div class="box"><strong>3. 결론</strong><p>조건이 충족될 때 법적 책임이 성립하는가.</p></div><h2>오답 찾기</h2><p>선택지가 조건 하나를 빼거나, 필요조건을 충분조건처럼 바꾸거나, 판례와 다른 입장의 결론을 섞는지 확인하세요.</p></article></main></body></html>
