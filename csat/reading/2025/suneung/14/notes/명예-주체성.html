<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>명예 주체성 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p><a href="../">← 본문으로</a></p><h1>명예 주체성</h1><p>명예 주체성은 어떤 대상이 명예를 보호받는 법적 주체가 될 수 있는지를 묻는 개념입니다.</p><h2>인정하는 입장</h2><div class="box"><p>인터넷 ID가 사용자의 정체성 일부라면, ID에 대한 공격은 개인의 명예에 대한 공격으로 볼 수 있습니다.</p></div><h2>인정하지 않는 입장</h2><div class="box"><p>ID가 단순한 구별 장치라면 ID 자체를 독립적인 명예의 주체로 보기 어렵습니다.</p></div><h2>선택지 판단</h2><p>‘ID가 유명하다’와 ‘ID가 법적으로 명예를 보호받는 주체다’는 같은 말이 아닙니다. 법적 주체성 여부를 따로 확인하세요.</p></article></main></body></html>
