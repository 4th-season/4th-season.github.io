<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>나만의 표시 체계 | 2025학년도 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(760px,calc(100% - 24px));margin:24px auto 72px}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}table{width:100%;border-collapse:collapse}th,td{padding:11px;border:1px solid #d8dee8;text-align:left}th{background:#eef4fb}a{color:#245d92}@media(max-width:600px){table{display:block;overflow:auto}}</style></head><body><main class="page"><article class="card"><p><a href="../">← 본문으로</a></p><h1>나만의 표시 체계</h1><p>표시 체계는 밑줄, 기호, 색을 정보의 성격에 따라 다르게 쓰는 약속입니다. 중요한 것은 복잡함이 아니라, 나중에 자신이 의미를 다시 알아볼 수 있는 일관성입니다.</p><table><tr><th>표시</th><th>사용 예</th></tr><tr><td>한 줄</td><td>문단의 중심 내용</td></tr><tr><td>두 줄</td><td>정의·원리·결론</td></tr><tr><td>□</td><td>비교 기준이나 조건</td></tr><tr><td>?</td><td>이해되지 않거나 확인할 부분</td></tr></table><h2>주의할 점</h2><p>표시 종류가 너무 많으면 표시를 해석하는 데 더 많은 시간이 듭니다. 독서 목적에 필요한 3～4개 정도의 규칙으로 시작하는 편이 좋습니다.</p></article></main></body></html>
