<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>관점 비교 읽기 | Note</title><style>body{max-width:760px;margin:40px auto;padding:0 18px;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:12px;background:#f8fafc}a{color:#245d92}</style></head><body><h1>관점 비교 읽기</h1><p>여러 인물이 등장하는 지문은 찬성과 반대로만 나누면 세부 차이를 놓치기 쉽습니다.</p><div class="box"><strong>비교할 네 기준</strong><br>1. 무엇을 문제로 보는가<br>2. 무엇이 먼저 필요하다고 보는가<br>3. 과학적 방법을 어디까지 적용하는가<br>4. 전통문화와 어떤 관계를 맺는가</div><h2>오답 찾기</h2><p>선택지는 한 인물의 말을 다른 인물에게 옮기거나, 적용 범위를 넓히거나 줄이고, 원문의 선후 관계를 뒤집어 오답을 만듭니다.</p><p><a href="../index.html">본문으로 돌아가기</a></p></body></html>
