<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>과학 정신과 과학적 방법 | Note</title><style>body{max-width:760px;margin:40px auto;padding:0 18px;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}table{width:100%;border-collapse:collapse}th,td{border:1px solid #d8dee8;padding:10px;text-align:left}th{background:#eef4fb}a{color:#245d92}</style></head><body><h1>과학 정신과 과학적 방법</h1><table><tr><th>인물</th><th>핵심</th></tr><tr><td>옌푸</td><td>기술보다 과학적으로 사고하는 정신이 먼저 필요하다.</td></tr><tr><td>천두슈</td><td>과학적 방법을 문화와 철학의 재구성에도 적용하려 한다.</td></tr><tr><td>장쥔마이</td><td>과학적 방법은 인정하지만 인생관에는 적용할 수 없다고 본다.</td></tr></table><h2>혼동하기 쉬운 점</h2><p>과학의 역작용을 비판하는 것과 과학적 방법 자체를 부정하는 것은 다릅니다. 또한 과학을 인정한다고 해서 모든 영역에 적용할 수 있다고 보는 것도 아닙니다.</p><p><a href="../index.html">본문으로 돌아가기</a></p></body></html>
