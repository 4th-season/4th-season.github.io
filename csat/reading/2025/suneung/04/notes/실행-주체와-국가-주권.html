<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>실행 주체와 국가 주권 | Note</title><style>body{max-width:760px;margin:40px auto;padding:0 18px;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:12px;background:#f8fafc}a{color:#245d92}</style></head><body><h1>실행 주체와 국가 주권</h1><p>개념의 변화는 뜻의 변화만이 아니라 ‘누가 행동하는가’의 변화이기도 합니다.</p><div class="box">왕이 개화를 이끎<br>↓<br>갑신정변 뒤 왕의 역할이 약화됨<br>↓<br>국가 구성원 전체가 개화의 주체로 등장<br>↓<br>근대 국가 주권을 향한 조직과 동원</div><h2>문항에서 확인할 점</h2><p>선택지가 시대는 맞게 제시하면서 실행 주체를 바꾸거나, 주권 의식이 처음 등장한 시점을 뒤로 미루는지 확인해야 합니다.</p><p><a href="../index.html">본문으로 돌아가기</a></p></body></html>
