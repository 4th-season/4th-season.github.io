<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>개화 개념의 변화 | Note</title><style>body{max-width:760px;margin:40px auto;padding:0 18px;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:12px;background:#f8fafc}a{color:#245d92}</style></head><body><h1>개화 개념의 변화</h1><p>개화는 처음부터 ‘서양화’만을 뜻한 말이 아니었습니다. 지문은 시대에 따라 개화의 뜻과 실행 주체가 어떻게 달라졌는지를 보여 줍니다.</p><div class="box">개항 이전: 통치자의 지식 확장과 백성 교화<br>개항 이후: 서양 기술과 제도의 선별적 수용<br>갑신정변 이후: 부정적 이미지 형성<br>이후: 국가 구성원 전체의 조직과 주권 지향</div><h2>읽기 기준</h2><p>개화의 뜻만 보지 말고, 누가 실행하는지와 무엇을 이루려는지도 함께 표시해야 합니다.</p><p><a href="../index.html">본문으로 돌아가기</a></p></body></html>
