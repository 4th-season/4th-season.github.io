<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>순확산과 역확산 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.85}.page{width:min(820px,calc(100% - 24px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px}a{color:#245d92}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:12px;background:#f8fafc}.tip{padding:14px 16px;border-left:4px solid #d97706;background:#fff8e8;border-radius:10px}</style></head><body><main class="page"><p><a href="../">← 본문으로 돌아가기</a></p><article class="card"><h1>순확산과 역확산</h1><div class="box"><strong>핵심 정의</strong><p>순확산은 노이즈를 더하며 예측기를 학습시키는 과정이고, 역확산은 예측한 노이즈를 빼며 이미지를 복원하는 과정입니다.</p></div><h2>구성 요소의 역할</h2><p>순확산에서는 노이즈 생성기가 작동하고 이미지 연산기가 노이즈를 더합니다. 역확산에서는 노이즈 생성기가 등장하지 않으며, 노이즈 예측기가 예측한 값을 이미지 연산기가 뺍니다.</p><div class="tip"><strong>문해력 판단 기준</strong><p>장치 이름보다 문장 속 동사를 확인합니다. 이미지 연산기는 순확산에서 ‘더하고’, 역확산에서 ‘뺍니다’.</p></div></article></main></body></html>
