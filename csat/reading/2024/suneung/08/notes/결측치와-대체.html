<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>결측치와 대체 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 28px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}a{color:#245d92}.box{padding:14px 16px;background:#eef4fb;border-left:4px solid #274c77;border-radius:12px}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>결측치와 대체</h1><p>결측치는 관측되어야 할 값이 비어 있는 상태입니다. 결측치를 그대로 두면 데이터의 대표적 특징을 왜곡할 수 있어 다른 값으로 채우는 대체가 사용됩니다.</p><div class="box"><strong>읽기 기준</strong><br>값이 빠졌는가 → 자료 유형은 무엇인가 → 어떤 대표값을 쓸 것인가</div><h2>핵심</h2><p>연속 수치는 평균, 순서가 있는 자료는 중앙값, 문자 범주 자료는 최빈값을 주로 사용합니다. ‘일반적으로’라는 표현은 모든 경우에 절대적으로 적용된다는 뜻이 아닙니다.</p></article></main></body></html>
