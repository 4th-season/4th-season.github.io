<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>이상치와 정상치 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 28px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}a{color:#245d92}.box{padding:14px 16px;background:#eef4fb;border-left:4px solid #274c77;border-radius:12px}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>이상치와 정상치</h1><p>이상치는 다른 데이터 값에 비해 유달리 크거나 작은 값입니다. 측정 오류로 생기기도 하지만 정상적인 데이터 안에서도 나타날 수 있습니다.</p><div class="box"><strong>핵심 구분</strong><br>이상치 = 무조건 오류가 아니다.<br>정상치 = 후보 직선과의 거리가 허용 범위 안에 있는 데이터다.</div><h2>문해력 포인트</h2><p>‘주로’와 ‘그러나’를 함께 읽어야 합니다. 주된 발생 원인이 측정 오류라는 사실과 모든 이상치가 오류라는 주장은 서로 다릅니다.</p></article></main></body></html>
