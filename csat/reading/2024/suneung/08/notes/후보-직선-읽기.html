<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>후보 직선 읽기 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 28px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}a{color:#245d92}.flow{padding:16px;border-radius:12px;background:#172235;color:#fff;white-space:pre-wrap}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>후보 직선 읽기</h1><p>후보 직선은 최종 답이 아니라 비교 대상으로 임시 설정한 직선입니다. 두 점을 지나는 직선을 만들고, 다른 모든 점이 이 직선에서 얼마나 떨어져 있는지 계산합니다.</p><div class="flow">두 점 선택
→ 후보 직선 생성
→ 각 점과 직선의 거리 계산
→ 허용 범위 안의 점을 정상치 집합으로 분류
→ 정상치가 가장 많은 후보 직선 선택</div><h2>주의</h2><p>후보 직선을 만드는 두 점과 정상치 집합 전체를 같은 것으로 보지 마세요. 또한 후보 직선이 이상치를 지날 가능성과 정상치 집합 안에 이상치가 포함될 가능성도 구분해야 합니다.</p></article></main></body></html>
