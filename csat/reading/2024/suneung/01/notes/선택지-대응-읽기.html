<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>선택지 대응 읽기 | 2024 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>선택지 대응 읽기</h1><p>선택지를 판단할 때는 비슷한 단어가 있는지만 보지 말고, 주체·행동·조건·결과가 원문과 같은지 확인해야 합니다.</p><div class="box"><strong>예시</strong><br>‘사용 중인 전략을 계속 사용했다’와 ‘문맥으로 의미를 가정하는 새 전략을 선택했다’는 둘 다 전략 이야기지만 행동이 다릅니다.</div><h2>확인 순서</h2><p>① 누가 판단했는가 → ② 무엇을 판단했는가 → ③ 어떤 조건에서 판단했는가 → ④ 그 결과 어떤 행동을 했는가</p><p>선택지가 원문의 일부 표현만 가져와 인과나 단계만 바꾼 경우가 가장 흔한 오답입니다.</p></article></main></body></html>
