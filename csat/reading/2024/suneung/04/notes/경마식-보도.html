<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>경마식 보도 | 2024 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}a{color:#245d92}.box{padding:14px;border-left:4px solid #274c77;background:#eef4fb;border-radius:10px}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>경마식 보도</h1><p>선거를 정책과 공약보다 지지율, 순위, 승패 중심으로 다루는 보도 방식입니다.</p><h2>읽기 핵심</h2><div class="box">장점: 관심과 참여를 높임<br>한계: 주요 의제를 가리고 경쟁 결과에 치중함</div><h2>선택지 판단</h2><p>‘흥미를 높인다’와 ‘정책 비교를 충실히 한다’를 같은 뜻으로 보지 마세요. 경마식 보도는 전자에는 가까울 수 있지만 후자를 약화할 수 있습니다.</p></article></main></body></html>
