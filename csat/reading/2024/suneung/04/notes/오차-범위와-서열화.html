<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>오차 범위와 서열화 | 2024 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}a{color:#245d92}.box{padding:14px;border-left:4px solid #274c77;background:#eef4fb;border-radius:10px}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>오차 범위와 서열화</h1><p>두 후보의 지지율 차이가 표본 오차 안에 있으면 실제 우열이 확정되었다고 보기 어렵습니다.</p><div class="box">허용 가능: 경합<br>부적절: 앞섰다, 우세하다, 1위다</div><h2>문해력 기준</h2><p>숫자의 차이와 우열의 확정을 구분하세요. 수치가 다르더라도 그 차이가 오차 범위 안이면 서열화할 근거가 부족합니다.</p></article></main></body></html>
