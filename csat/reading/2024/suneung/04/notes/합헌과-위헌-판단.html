<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>합헌과 위헌 판단 | 2024 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}a{color:#245d92}.box{padding:14px;border-left:4px solid #274c77;background:#eef4fb;border-radius:10px}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>합헌과 위헌 판단</h1><p>합헌은 해당 규정이 헌법에 어긋나지 않는다는 판단이고, 위헌은 헌법에 어긋난다는 판단입니다.</p><h2>읽기 순서</h2><div class="box">문제 된 규정 → 침해된다고 주장된 권리 → 재판기관의 판단 → 판단 근거</div><p>이 지문에서는 규정 자체와 권리 사이의 관계를 묻습니다. 알 권리와 언론의 자유가 서로 충돌한다고 바꾸어 읽으면 안 됩니다.</p></article></main></body></html>
