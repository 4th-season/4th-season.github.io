<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>사상가 비교 읽기 | 문해력 Note</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;margin:0;background:#f5f7fb;color:#1f2937}main{width:min(760px,calc(100% - 28px));margin:32px auto;background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.step{padding:12px 14px;border-left:4px solid #274c77;background:#eef4fb;margin:12px 0}a{color:#245d92}</style></head><body><main><p><a href="../">← 본문으로</a></p><h1>사상가 비교 읽기</h1><div class="step"><strong>1. 공통 질문 찾기</strong><br>모든 인물이 무엇을 설명하려는지 확인합니다.</div><div class="step"><strong>2. 핵심 개념 정의</strong><br>각 인물이 ‘도’를 무엇으로 보는지 적습니다.</div><div class="step"><strong>3. 현실 적용 확인</strong><br>정치·제도·도덕에 어떤 결론을 내리는지 연결합니다.</div><div class="step"><strong>4. 해석 태도 비교</strong><br>원문 보존, 재구성, 통합, 비판 중 어느 방식인지 구분합니다.</div><h2>선택지 판단</h2><p>한 문장에 두 인물이 함께 나오면 공통점과 차이점을 각각 검증해야 합니다. 한쪽만 맞아도 전체 선택지는 틀릴 수 있습니다.</p></main></body></html>
