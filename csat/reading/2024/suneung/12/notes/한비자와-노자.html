<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>한비자와 노자 | 개념 Note</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;margin:0;background:#f5f7fb;color:#1f2937}main{width:min(760px,calc(100% - 28px));margin:32px auto;background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style></head><body><main><p><a href="../">← 본문으로</a></p><h1>한비자와 노자</h1><div class="box">한비자는 『노자』의 도를 천지 만물의 존재와 본질을 가능하게 하는 근거로 이해했지만, 현실 사회 운영에서는 법과 제도를 통한 적극적 개입이 필요하다고 보았습니다.</div><h2>읽기 핵심</h2><p>한비자가 『노자』의 개념을 받아들였다는 사실과 『노자』의 정치적 태도까지 그대로 받아들였다는 판단은 다릅니다. 수능에서는 개념 수용과 현실 적용을 분리해 읽어야 합니다.</p></main></body></html>
