<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>왕부지의 주석 비판 | 개념 Note</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;margin:0;background:#f5f7fb;color:#1f2937}main{width:min(760px,calc(100% - 28px));margin:32px auto;background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style></head><body><main><p><a href="../">← 본문으로</a></p><h1>왕부지의 주석 비판</h1><div class="box">왕부지는 『노자』의 본래 뜻을 정확히 드러낸 뒤 그 비현실성을 비판하려 했습니다. 다른 사상을 기준으로 원문을 고치면 『노자』와 주석자의 사상 모두 왜곡된다고 보았습니다.</div><h2>헷갈리기 쉬운 점</h2><p>원문을 정확히 이해하려는 태도는 그 사상을 긍정한다는 뜻이 아닙니다. 이해와 동의, 해석과 평가를 구분해야 합니다.</p></main></body></html>
