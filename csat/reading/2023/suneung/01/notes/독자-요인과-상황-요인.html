<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>독자 요인과 상황 요인 | 2023학년도 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 28px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}table{width:100%;border-collapse:collapse}th,td{padding:12px;border:1px solid #d8dee8;text-align:left}th{background:#eef4fb}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>독자 요인과 상황 요인</h1><table><tr><th>구분</th><th>내용</th></tr><tr><td>독자 요인</td><td>배경지식, 관점처럼 독자 내부에 속한 특성</td></tr><tr><td>상황 요인</td><td>읽기 환경, 과제처럼 독서가 이루어지는 외부 조건</td></tr></table><h2>오답이 만들어지는 방식</h2><p>선택지는 실제 예시를 다른 범주에 넣어 혼동을 만듭니다. 읽기 환경과 과제는 독자가 가진 지식이나 관점이 아니므로 독자 요인으로 볼 수 없습니다.</p></article></main></body></html>
