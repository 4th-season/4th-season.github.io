<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>질문과 답의 유형 | 2023학년도 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 28px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}table{width:100%;border-collapse:collapse}th,td{padding:12px;border:1px solid #d8dee8;text-align:left;vertical-align:top}th{background:#eef4fb}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>질문과 답의 유형</h1><table><tr><th>질문</th><th>답을 찾는 방식</th></tr><tr><td>책에서 답을 찾는 질문</td><td>명시된 내용을 확인하거나 여러 내용을 관계 지어 답을 구성한다.</td></tr><tr><td>독자 자신에게서 답을 찾는 질문</td><td>책에 없는 자신의 경험과 삶에서 답을 찾는다.</td></tr></table><h2>문항 적용 순서</h2><p>먼저 질문의 방향을 판별하고, 다음으로 답의 출처가 명시 내용·내용 간 관계·개인 경험 중 어디인지 확인합니다.</p></article></main></body></html>
