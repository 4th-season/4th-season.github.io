<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>다른 독자와의 소통 | 2023학년도 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 28px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>다른 독자와의 소통</h1><p>다른 독자와의 소통은 책을 읽으며 개인적으로 만든 의미를 독서 모임, 동아리, 온라인 공간 등에서 나누는 과정입니다.</p><h2>두 가지 결과</h2><p>비슷한 해석에 공감하면 기존 인식이 강화되고, 관점의 차이를 확인하면 기존 인식이 조정될 수 있습니다. 두 경우 모두 인식의 심화와 확장으로 이어질 수 있습니다.</p><h2>판단 기준</h2><p>선택지에 다른 독자가 실제로 참여하는지 확인합니다. 혼자 책을 고르고 읽는 활동만으로는 이 개념에 해당하지 않습니다.</p></article></main></body></html>
