<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>책과의 소통 | 2023학년도 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 28px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>책과의 소통</h1><p>책과의 소통은 필자와 직접 대화하는 일이 아니라 글을 매개로 필자가 보여 주는 사회·시대·삶을 독자가 해석하는 과정입니다.</p><h2>핵심 구조</h2><p>필자의 세계 제시 → 독자의 배경지식과 관점이 작용 → 읽기 환경과 과제가 영향을 줌 → 독자마다 다른 의미 구성</p><h2>선택지 판단</h2><p>독자는 필자의 뜻을 그대로 복사하지 않습니다. 같은 책을 읽어도 독자와 상황이 다르면 다른 의미가 만들어질 수 있습니다.</p></article></main></body></html>
