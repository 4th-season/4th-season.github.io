<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>형벌의 목적과 비례 | 수능 독서 Note</title><link rel="canonical" href="https://4th-season.com/csat/reading/2022/june/10/notes/형벌의-목적과-비례.html"><style>body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:#1f2937;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;background:#eef4fb;border-radius:12px;margin:12px 0}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p><a href="/csat/reading/2022/june/10/">지문으로 돌아가기</a></p><h1>형벌의 목적과 비례</h1><p>베카리아에게 형벌의 목적은 복수나 고통 자체가 아니라 재범과 모방 범죄의 예방입니다.</p><div class="box"><strong>비례 원칙:</strong> 형벌은 범죄가 훼손한 공익의 정도에 비례해야 하며, 그 이상은 폭압이고 불필요합니다.</div><h2>수능 판단</h2><p>형벌이 강할수록 무조건 좋다고 바꾸거나 피해 회복이 목적이라고 바꾸면 틀립니다.</p><details><summary>확인 문제</summary><p>형벌의 최소 기준은 무엇인가? → 범죄로 얻는 이익보다 형벌의 손해가 조금 더 큰 정도</p></details></article></main></body></html>
