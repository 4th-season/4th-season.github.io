<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>사회 계약과 형벌권 | 수능 독서 Note</title><link rel="canonical" href="https://4th-season.com/csat/reading/2022/june/10/notes/사회-계약과-형벌권.html"><style>body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:#1f2937;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;background:#eef4fb;border-radius:12px;margin:12px 0}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p><a href="/csat/reading/2022/june/10/">지문으로 돌아가기</a></p><h1>사회 계약과 형벌권</h1><p>개인은 평온한 삶을 위해 자유의 일부를 양도하고, 그 총합이 주권을 이룹니다.</p><div class="box"><strong>핵심:</strong> 형벌권은 양도된 자유의 범위 안에서만 행사될 수 있습니다.</div><h2>수능 판단</h2><p>국민 개개인이 직접 형벌을 시행한다고 바꾸거나, 형벌권이 양도 범위를 넘어설 수 있다고 바꾸면 틀립니다.</p><details><summary>확인 문제</summary><p>형벌권의 한계를 정하는 기준은 무엇인가? → 개인들이 양도한 자유의 범위</p></details></article></main></body></html>
