<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>베카리아의 사형 비판 | 수능 독서 Note</title><link rel="canonical" href="https://4th-season.com/csat/reading/2022/june/10/notes/베카리아의-사형-비판.html"><style>body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:#1f2937;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;background:#eef4fb;border-radius:12px;margin:12px 0}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p><a href="/csat/reading/2022/june/10/">지문으로 돌아가기</a></p><h1>베카리아의 사형 비판</h1><p>베카리아는 사형을 사회 계약과 일반 예방의 두 방향에서 비판합니다.</p><div class="box"><strong>사회 계약:</strong> 공동체를 지키기 위해 양도한 자유에 생명은 포함될 수 없습니다.</div><div class="box"><strong>일반 예방:</strong> 죽는 장면의 충격은 일시적이지만 자유 박탈의 지속은 더 강한 억제 효과를 낼 수 있습니다.</div><h2>수능 판단</h2><p>사형에 예방 효과가 전혀 없다고 보았다고 바꾸거나, 피해 회복을 위해 무기 징역을 주장했다고 바꾸면 틀립니다.</p><details><summary>확인 문제</summary><p>사형 비판의 핵심 근거 두 가지는? → 생명 양도 불가, 지속적 형벌의 더 큰 억제 효과</p></details></article></main></body></html>
