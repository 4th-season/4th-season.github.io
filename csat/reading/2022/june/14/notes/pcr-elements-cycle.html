<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PCR 구성 요소와 사이클 | 수능 독서 Note</title><link rel="canonical" href="https://4th-season.com/csat/reading/2022/june/14/notes/pcr-elements-cycle.html"><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}table{width:100%;border-collapse:collapse}th,td{padding:11px;border:1px solid #d8dee8}th{background:#eef4fb}a{color:#245d92}</style></head><body><main class="page"><article class="card"><h1>PCR 구성 요소와 사이클</h1><table><tr><th>요소</th><th>역할</th></tr><tr><td>주형 DNA</td><td>증폭의 바탕이 되는 이중 가닥 DNA</td></tr><tr><td>표적 DNA</td><td>주형 중 실제로 증폭할 구간</td></tr><tr><td>프라이머</td><td>표적 양쪽에 결합해 증폭 범위를 결정</td></tr><tr><td>DNA 중합 효소</td><td>새 DNA 가닥을 합성</td></tr><tr><td>뉴클레오타이드</td><td>새 DNA의 재료</td></tr></table><h2>한 사이클</h2><p>가열해 두 가닥을 분리하고, 프라이머가 결합한 뒤, 중합 효소가 새 가닥을 합성합니다. 이 과정이 반복되며 표적 DNA가 늘어납니다.</p><details><summary>확인 문제</summary><p>증폭 범위를 직접 정하는 요소는 프라이머입니다.</p></details><p><a href="../">본문으로 돌아가기</a></p></article></main></body></html>
