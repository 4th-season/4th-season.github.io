<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>감각 전달 장치</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px}h1,h2{color:#274c77}.box{padding:15px;border-radius:12px;background:#eef4fb}a{color:#245d92;font-weight:800}</style><main class="page"><article class="card"><h1>감각 전달 장치</h1><p>감각 전달 장치는 아바타가 보고 만지는 것으로 설정된 감각을 사용자에게 전달하는 장치입니다.</p><h2>방향을 먼저 본다</h2><div class="box"><strong>아바타의 감각 설정 → 장치 → 사용자</strong></div><p>가상 현실 장갑은 가상 물체의 크기·형태·온도를 사용자 손에 전달합니다. 사용자의 감각 반응이 다시 아바타에게 전달된다고 확대하면 틀립니다.</p><h2>시험장에서의 기준</h2><p>‘누가 느끼는가’와 ‘누구의 움직임이 전달되는가’를 따로 표시합니다. 감각 전달과 동작 전달은 방향이 다를 수 있습니다.</p><p><a href="../index.html">학습 페이지로 돌아가기</a></p></article></main></html>
