트레드밀 변화 → HMD 장면 변경</div><h2>주의할 방향</h2><p>아바타가 사용자를 움직이는 것이 아니라 사용자 동작이 아바타에 반영됩니다. HMD도 트레드밀을 제어하지 않고 변경된 장면을 표시합니다.</p><p><a href="../index.html">학습 페이지로 돌아가기</a></p></article></main></html>
