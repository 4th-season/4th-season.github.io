<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>가상 현실 장갑</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px}h1,h2{color:#274c77}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{padding:15px;border-radius:12px;background:#eef4fb}@media(max-width:600px){.grid{grid-template-columns:1fr}}a{color:#245d92;font-weight:800}</style><main class="page"><article class="card"><h1>가상 현실 장갑</h1><p>가상 현실 장갑은 촉각 전달과 동작 전달이라는 두 기능을 가집니다.</p><div class="grid"><div class="box"><strong>감각 전달</strong><p>가상 물체의 크기·형태·온도 → 사용자 손</p></div><div class="box"><strong>동작 전달</strong><p>사용자의 손가락·팔 움직임 → 아바타</p></div></div><h2>선택지 함정</h2><p>두 기능이 있다고 해서 사용자와 아바타가 감각 반응을 서로 주고받는 것은 아닙니다. 감각과 동작의 전달 방향을 따로 읽어야 합니다.</p><p><a href="../index.html">학습 페이지로 돌아가기</a></p></article></main></html>
