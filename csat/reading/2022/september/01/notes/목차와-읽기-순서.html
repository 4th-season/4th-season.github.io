<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>목차와 읽기 순서</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>목차와 읽기 순서</h1><p>목차는 책의 장과 절을 나열한 목록이지만, 독자는 이를 통해 책의 범위와 구성, 내용의 배열을 미리 파악할 수 있습니다.</p><p>이 지문에서 학생은 제목만 보고 유럽 미술만 다룰 것이라 예상했지만, “본문을 읽기 전에 목차를 살펴보니” 유럽 외 지역도 포함한다는 사실을 알았습니다.</p><p>또한 내용이 방대하다는 점을 확인한 뒤, 관심 있던 르네상스 부분을 “먼저 읽은 후” 나머지를 읽었습니다. 목차 확인이 구성 파악과 읽기 순서 조정으로 이어진 것입니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
