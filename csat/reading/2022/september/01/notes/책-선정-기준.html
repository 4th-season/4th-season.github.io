<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>책 선정 기준</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>책 선정 기준</h1><p>책 선정 기준은 책이 유명한가만 따지는 것이 아니라, 독자의 목적·관심·지식수준과 책의 난이도·범위가 맞는지 살피는 기준입니다.</p><p>이 지문에서는 “미술에 대해 막 알아 가기 시작한 나”와 “나와 같은 독자도 이해할 수”가 서로 대응합니다. 따라서 학생은 자신의 지식수준에서 이해할 수 있는지를 책 선정 기준으로 삼았습니다.</p><p>선택지에서는 지문에 없는 추천 연령, 공동 집필, 최신 자료 같은 기준을 덧붙이지 않았는지 확인합니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
