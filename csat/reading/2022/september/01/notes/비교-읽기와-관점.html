<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>비교 읽기와 관점</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>비교 읽기와 관점</h1><p>비교 읽기는 내용상 관련된 두 부분을 나란히 놓고 공통점과 차이, 반복되는 표현의 의미를 확인하는 읽기 방법입니다.</p><p>이 지문에서는 서론과 27장에 같은 구절이 반복됩니다. 학생은 두 부분을 “비교하여 읽으면서” 미술가와 미술 작품에 주목하는 저자의 관점을 더 잘 이해했습니다.</p><p>관점은 어떤 대상을 바라보고 해석하는 방식입니다. 선택지에서는 단순히 같은 문장이 반복되었다는 사실보다, 비교가 저자의 관점 이해로 이어졌는지를 확인합니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
