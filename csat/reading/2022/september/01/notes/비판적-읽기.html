<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>비판적 읽기</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>비판적 읽기</h1><p>비판적 읽기는 글의 내용을 무조건 거부하는 읽기가 아니라, 근거와 관점, 배경을 살피며 자신의 판단을 세우는 읽기입니다.</p><p>이 지문에서 학생은 “저자가 해설한 내용을 저자의 관점에 따라 받아들이는 것만으로도” 만족했습니다. 그러나 &lt;보기&gt;는 저자의 해설에도 시대의 사회·문화적 환경이 반영될 수 있으므로 “자신의 주관을 가지고” 판단해야 한다고 말합니다.</p><p>따라서 핵심은 저자의 관점을 이해한 뒤, 그 관점을 자신의 관점으로 다시 판단하는 데 있습니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
