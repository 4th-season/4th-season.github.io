<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>욕구 충족적 자유의지 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(780px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px;border-radius:12px;background:#eef4fb}a{color:#245d92;font-weight:800}</style></head><body><main class="page"><article class="card"><h1>욕구 충족적 자유의지</h1><p class="box">‘내가 하고자 원했던 것을 했다’는 의미의 자유의지입니다.</p><h2>선결정과의 관계</h2><p>선택이 이전 사건에 의해 선결정되어 있더라도, 내가 원했던 행동을 실제로 했다면 욕구 충족적 자유의지의 산물이라고 말할 수 있습니다.</p><h2>두 조건의 자유의지와 차이</h2><p>욕구 충족 여부만 확인하므로 선택이 선결정되지 않았는지는 요구하지 않습니다. 그래서 지문에서 염두에 둔 두 조건을 모두 충족하는 자유의지와 다릅니다.</p><h2>선택지 함정</h2><p>‘선결정되어 있다’는 사실만 보고 욕구 충족적 자유의지까지 부정하면 안 됩니다.</p><p><a href="../index.html">← 지문으로 돌아가기</a></p></article></main></body></html>
