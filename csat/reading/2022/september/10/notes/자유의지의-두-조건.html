<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>자유의지의 두 조건 | 개념 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(780px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px;border-radius:12px;background:#eef4fb}a{color:#245d92;font-weight:800}</style></head><body><main class="page"><article class="card"><h1>자유의지의 두 조건</h1><div class="box"><strong>첫째</strong>, 내가 그 선택의 주체여야 합니다.<br><strong>둘째</strong>, 그 선택이 이전 사건들에 의해 선결정되지 않아야 합니다.</div><h2>왜 두 조건이 모두 필요한가</h2><p>내가 원한 행동을 했더라도 선택이 이미 선결정되어 있다면 둘째 조건을 충족하지 못합니다. 반대로 선결정되지 않았더라도 그 선택의 주체가 내가 아니라면 첫째 조건을 충족하지 못합니다.</p><h2>문항 판단법</h2><p>선택지를 볼 때 ‘주체성’과 ‘비선결정성’을 따로 확인한 뒤 두 칸이 모두 충족되는지 판단합니다.</p><p><a href="../index.html">← 지문으로 돌아가기</a></p></article></main></body></html>
