<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>환율 방향 읽기 | 2022 수능 독서 Note</title><style>body{margin:0;background:#f4f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8e1ec;border-radius:18px;padding:26px}h1,h2{color:#234e70}.box{padding:14px 16px;border-left:4px solid #234e70;background:#eef5fb;border-radius:10px}a{color:#1e5b8f}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>환율 방향 읽기</h1><div class="box">‘A국 통화에 대한 B국 통화의 환율’에서 기준과 비교 대상을 먼저 고정해야 합니다.</div><h2>판단 순서</h2><p>① 환율 표현의 기준 통화를 확인합니다. ② 상승·하락 폭을 비교합니다. ③ 두 통화의 상대 가치 변화를 정리합니다. ④ 수출·수입과 경상 수지에 연결합니다.</p><h2>자주 생기는 오류</h2><p>환율이 하락했다는 말만 보고 통화 가치도 무조건 하락했다고 판단하면 안 됩니다. 어떤 통화 기준의 환율인지에 따라 가치 변화의 방향이 달라집니다.</p></article></main></body></html>
