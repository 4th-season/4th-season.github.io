<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>트리핀 딜레마 | 2022 수능 독서 Note</title><style>body{margin:0;background:#f4f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8e1ec;border-radius:18px;padding:26px}h1,h2{color:#234e70}.box{padding:14px 16px;border-left:4px solid #234e70;background:#eef5fb;border-radius:10px}a{color:#1e5b8f}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>트리핀 딜레마</h1><div class="box">국제 유동성 공급과 기축 통화의 신뢰 유지가 서로 충돌하는 문제입니다.</div><h2>두 요구</h2><p>세계 경제에는 충분한 달러 공급이 필요합니다. 이를 위해 미국의 국제 수지 적자가 이어질 수 있지만, 적자가 누적되면 달러화에 대한 신뢰가 낮아질 수 있습니다.</p><h2>문해력 포인트</h2><p>‘적자’의 기능과 부작용을 동시에 읽어야 합니다. 공급을 늘리는 원인이면서 동시에 신뢰를 떨어뜨리는 원인이 될 수 있습니다.</p></article></main></body></html>
