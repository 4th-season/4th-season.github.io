<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>기축 통화 | 2022 수능 독서 Note</title><style>body{margin:0;background:#f4f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8e1ec;border-radius:18px;padding:26px}h1,h2{color:#234e70}.box{padding:14px 16px;border-left:4px solid #234e70;background:#eef5fb;border-radius:10px}a{color:#1e5b8f}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>기축 통화</h1><div class="box">국제 거래와 환율 결정에서 기준 역할을 하는 통화입니다.</div><h2>지문에서의 역할</h2><p>브레턴우즈 체제에서는 달러화가 금에 고정되고 다른 나라의 통화가 달러화에 고정됩니다. 따라서 각국 통화끼리의 관계도 달러화를 매개로 계산할 수 있습니다.</p><h2>읽을 때 주의할 점</h2><p>기축 통화는 단순히 가치가 높은 통화가 아니라 국제 결제와 환율 구조의 중심 기준이라는 기능으로 읽어야 합니다.</p></article></main></body></html>
