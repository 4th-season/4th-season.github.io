<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>교차 환율 | 2022 수능 독서 Note</title><style>body{margin:0;background:#f4f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8e1ec;border-radius:18px;padding:26px}h1,h2{color:#234e70}.box{padding:14px 16px;border-left:4px solid #234e70;background:#eef5fb;border-radius:10px}a{color:#1e5b8f}</style></head><body><main class="wrap"><article class="card"><p><a href="../">← 본문으로</a></p><h1>교차 환율</h1><div class="box">기축 통화를 제외한 두 통화 사이의 환율입니다.</div><h2>어떻게 정해지는가</h2><p>각 통화와 기축 통화의 환율이 정해지면, 두 비기축 통화 사이의 환율은 두 값을 이용해 자동으로 계산됩니다.</p><h2>가짓수 문제</h2><p>전체 환율 수, 직접 정하는 환율 수, 자동으로 정해지는 교차 환율 수를 구분해야 합니다. 세 나라 중 한 나라가 기축 통화국이면 나머지 두 나라 사이의 교차 환율은 한 가지입니다.</p></article></main></body></html>
