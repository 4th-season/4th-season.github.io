<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>시점 변환 | 2022 수능 Note</title><style>body{max-width:760px;margin:40px auto;padding:0 20px;font-family:sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:14px;background:#f8fbff}a{color:#245d92}</style></head><body><a href="../">← 본문으로</a><h1>시점 변환</h1><div class="box"><p>시점 변환은 카메라 시점의 영상을 위에서 내려다보는 것 같은 2차원 영상으로 바꾸는 과정입니다. 보정된 영상의 점과 실세계 격자판 점의 대응 관계를 이용합니다.</p></div><h2>핵심 구분</h2><p>왜곡 보정은 휘거나 어긋난 모양을 고치는 단계이고, 시점 변환은 원근 효과와 관찰 위치를 바꾸는 단계입니다. 둘은 같은 작업이 아닙니다.</p></body></html>
