<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>내부 변수와 외부 변수 | 2022 수능 Note</title><style>body{max-width:760px;margin:40px auto;padding:0 20px;font-family:sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:14px;background:#f8fbff}a{color:#245d92}</style></head><body><a href="../">← 본문으로</a><h1>내부 변수와 외부 변수</h1><div class="box"><p><strong>내부 변수</strong>는 렌즈의 곡률처럼 카메라 자체의 특성에서 비롯됩니다. <strong>외부 변수</strong>는 카메라의 위치와 기울기처럼 설치 상태에서 비롯됩니다.</p></div><h2>오답 방지</h2><p>카메라 자체의 특성을 안다고 해서 설치 각도에서 생긴 왜곡까지 자동으로 해결되는 것은 아닙니다. 원인을 같은 범주로 바꾸어 놓은 선택지를 조심하세요.</p></body></html>
