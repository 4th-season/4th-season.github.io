<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>절대정신과 예술 | 2022 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:28px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;border-left:4px solid #274c77}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p><a href="../">← 본문으로</a></p><h1>절대정신과 예술</h1><p>헤겔에게 예술·종교·철학은 모두 절대정신의 형태입니다. 세 영역은 동일한 절대적 진리를 내용으로 삼지만, 그 진리를 인식하는 형식이 다릅니다.</p><div class="box">예술은 감각적 직관, 종교는 표상, 철학은 개념적 사유를 통해 진리를 인식합니다.</div><h2>문해력 포인트</h2><p>‘내용은 동일하고 형식은 다르다’는 구분을 유지해야 합니다. 선택지가 예술·종교·철학의 내용을 서로 다르게 설명하면 지문과 어긋납니다.</p></article></main></body></html>
