<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>의미 확정 과정 | 2026학년도 6월 모의평가 Note</title><style>body{margin:0;background:#091521;color:#edf4fb;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8}.w{max-width:760px;margin:auto;padding:36px 20px}article{background:#102438;border:1px solid #294760;border-radius:16px;padding:22px}a{color:#9fd0ff}</style></head><body><main class="w"><h1>의미 확정 과정</h1><article><p>동형이의어의 의미는 다음 순서로 확정됩니다.</p><p><strong>1. 고빈도 의미를 먼저 떠올린다 → 2. 문장 안의 다른 단어와 연결한다 → 3. 제약성이 약하면 판단을 유보한다 → 4. 뒤 문장을 읽어 문맥을 만든다 → 5. 문맥에 가장 잘 맞는 의미를 선택한다.</strong></p><p>선택지에서는 이 순서가 뒤바뀌거나, 의미를 새로 만든다고 표현하거나, 문맥을 무시한다고 표현한 경우를 경계해야 합니다.</p></article><p><a href="../index.html">본문으로 돌아가기</a></p></main></body></html>
