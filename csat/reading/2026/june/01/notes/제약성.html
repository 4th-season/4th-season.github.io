<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>문장과 문맥의 제약성 | 2026학년도 6월 모의평가 Note</title><style>body{margin:0;background:#091521;color:#edf4fb;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8}.w{max-width:760px;margin:auto;padding:36px 20px}article{background:#102438;border:1px solid #294760;border-radius:16px;padding:22px}a{color:#9fd0ff}</style></head><body><main class="w"><h1>문장과 문맥의 제약성</h1><article><p>제약성은 가능한 해석의 범위를 좁히는 힘입니다. ‘사과를 깎았다’에서 ‘깎았다’는 사과를 과일로 제한하므로 제약성이 강합니다.</p><p>반대로 ‘사과를 받았다’는 과일과 사과 행위를 모두 허용할 수 있어 제약성이 약합니다. 이때는 의미를 즉시 결정하지 않고 뒤 문장을 더 읽어 문맥의 제약성을 확인해야 합니다.</p></article><p><a href="../index.html">본문으로 돌아가기</a></p></main></body></html>
