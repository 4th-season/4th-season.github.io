<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>고빈도 단어 | 2026학년도 6월 모의평가 Note</title><style>body{margin:0;background:#091521;color:#edf4fb;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8}.w{max-width:760px;margin:auto;padding:36px 20px}article{background:#102438;border:1px solid #294760;border-radius:16px;padding:22px}a{color:#9fd0ff}</style></head><body><main class="w"><h1>고빈도 단어</h1><article><p>고빈도 단어는 일상에서 다른 단어보다 자주 쓰이는 단어입니다. 표기가 같은 동형이의어를 만나면 독자는 대체로 사용 빈도가 높은 의미부터 떠올립니다.</p><p>하지만 <strong>먼저 떠오른 의미가 곧 정답은 아닙니다.</strong> 문장과 맞지 않으면 다른 의미 후보를 확인해야 합니다. 고빈도는 탐색 순서를 설명할 뿐 의미를 최종 결정하지 않습니다.</p></article><p><a href="../index.html">본문으로 돌아가기</a></p></main></body></html>
