<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>동형이의어 | 2026학년도 6월 모의평가 Note</title><style>body{margin:0;background:#091521;color:#edf4fb;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8}.w{max-width:760px;margin:auto;padding:36px 20px}article{background:#102438;border:1px solid #294760;border-radius:16px;padding:22px}a{color:#9fd0ff}</style></head><body><main class="w"><h1>동형이의어</h1><article><p>동형이의어는 <strong>표기는 같지만 서로 다른 단어이며 의미도 다른 말</strong>입니다. ‘사과’는 과일을 뜻할 수도 있고 잘못을 빌어 용서를 구하는 행위를 뜻할 수도 있습니다.</p><p>읽을 때 중요한 것은 사전에 가능한 의미를 모두 떠올리는 데서 끝나지 않고, 문장 속 다른 단어와 뒤 문장까지 연결해 실제 의미를 확정하는 것입니다.</p></article><p><a href="../index.html">본문으로 돌아가기</a></p></main></body></html>
