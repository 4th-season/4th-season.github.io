<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>톨루엔과 MCH</title><style>body{margin:0;background:#071321;color:#eaf2fb;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8}.wrap{max-width:760px;margin:auto;padding:32px 18px}a{color:#9bc7ff}.card{background:#102238;border:1px solid #29435f;border-radius:18px;padding:22px}</style></head><body><main class="wrap"><p><a href="../">← 본문으로</a></p><article class="card"><h1>톨루엔과 MCH</h1><p>톨루엔에 수소가 결합하면 메틸사이클로헥세인(MCH)이 되고, MCH에서 수소를 제거하면 다시 톨루엔과 수소가 된다.</p><p>이 상호 전환을 이용하면 액체 상태로 수소를 저장·운송할 수 있고 기존 석유 인프라를 활용할 수 있다.</p><p>다만 전환을 반복하면 화합물의 안정성이 낮아질 수 있으므로, 지문에서는 ‘활용 가능성’과 ‘반복 과정의 한계’를 함께 읽어야 한다.</p></article></main></body></html>
