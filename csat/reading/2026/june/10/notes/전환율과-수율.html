<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>전환율과 수율</title><style>body{margin:0;background:#071321;color:#eaf2fb;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8}.wrap{max-width:760px;margin:auto;padding:32px 18px}a{color:#9bc7ff}.card{background:#102238;border:1px solid #29435f;border-radius:18px;padding:22px}</style></head><body><main class="wrap"><p><a href="../">← 본문으로</a></p><article class="card"><h1>전환율과 수율</h1><p><b>전환율</b>은 공급된 물질 중 실제로 반응한 비율이고, <b>수율</b>은 원하는 생성물이 실제로 얻어진 정도이다.</p><p>전환율이 높아도 부반응이 많이 일어나면 원하는 생성물의 수율은 낮을 수 있다. 따라서 두 수치를 같은 뜻으로 읽어서는 안 된다.</p><p>문제에서는 ‘많이 반응했다’와 ‘원하는 물질이 많이 만들어졌다’를 분리해 판단해야 한다.</p></article></main></body></html>
