<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>수소 운반체</title><style>body{margin:0;background:#071321;color:#eaf2fb;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8}.wrap{max-width:760px;margin:auto;padding:32px 18px}a{color:#9bc7ff}.card{background:#102238;border:1px solid #29435f;border-radius:18px;padding:22px}</style></head><body><main class="wrap"><p><a href="../">← 본문으로</a></p><article class="card"><h1>수소 운반체</h1><p>수소 운반체는 수소를 다른 물질에 결합하거나 포함시켜 저장과 운송을 쉽게 하도록 하는 물질이다.</p><p>수소 기체는 부피가 크고 폭발 위험이 있어 그대로 다루기 어렵다. 따라서 액상 유기 화합물이나 암모니아처럼 기존 저장·운송 설비를 활용할 수 있는 물질에 수소를 담았다가 필요한 곳에서 다시 추출한다.</p><p>지문에서는 운반체의 장점만 보지 말고 독성, 안정성, 추출 조건 같은 한계까지 함께 비교해야 한다.</p></article></main></body></html>
