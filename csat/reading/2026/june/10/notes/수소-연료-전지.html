<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>수소 연료 전지</title><style>body{margin:0;background:#071321;color:#eaf2fb;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.8}.wrap{max-width:760px;margin:auto;padding:32px 18px}a{color:#9bc7ff}.card{background:#102238;border:1px solid #29435f;border-radius:18px;padding:22px}</style></head><body><main class="wrap"><p><a href="../">← 본문으로</a></p><article class="card"><h1>수소 연료 전지</h1><p>수소 연료 전지는 수소의 화학 에너지를 전기 에너지로 직접 바꾸는 장치이다.</p><p>산화 극에서 수소가 수소 이온과 전자로 나뉜다. 수소 이온은 전해질을 통해, 전자는 도선을 통해 환원 극으로 이동한다. 전자의 이동이 전류를 만든다.</p><p>문항에서는 수소 이온과 전자의 이동 경로, 산화 극과 환원 극에서 공급되는 물질을 서로 바꾸어 제시하는 오답을 주의해야 한다.</p></article></main></body></html>
