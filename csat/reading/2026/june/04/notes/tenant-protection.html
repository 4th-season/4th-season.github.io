<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>임차인 보호의 논리</title></head><body><main><h1>임차인 보호의 논리</h1><p>임차인은 주거의 필요성과 교섭력 차이 때문에 계약에서 불리할 수 있습니다. 임대차 보호법은 갱신 요구권이나 차임 증액 제한처럼 계약 자유를 일부 제한해 주거 안정을 보완합니다.</p><p><a href="../">본문으로 돌아가기</a></p></main></body></html>
