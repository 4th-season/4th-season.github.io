<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>보완 관계 읽기</title></head><body><main><h1>보완 관계 읽기</h1><p>새로운 제도가 등장했다고 해서 앞선 제도의 가치가 모두 폐기되는 것은 아닙니다. 지문에서는 앞 모델의 장점을 유지하면서 한계를 보완하는 관계를 찾아야 합니다.</p><p><a href="../">본문으로 돌아가기</a></p></main></body></html>
