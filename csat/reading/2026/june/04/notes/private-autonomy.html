<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>사적 자치와 강행 규정</title></head><body><main><h1>사적 자치와 강행 규정</h1><p>사적 자치는 당사자가 자신의 의사에 따라 계약 내용을 정하는 원칙입니다. 강행 규정은 사회적 약자 보호나 공익을 위해 당사자 합의로 배제할 수 없도록 한 규정입니다.</p><p><a href="../">본문으로 돌아가기</a></p></main></body></html>
