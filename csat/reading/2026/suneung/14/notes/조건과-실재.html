<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>조건과 실재</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;word-break:keep-all}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1,h2{color:#274c77}.flow{padding:16px;background:#172235;color:#fff;border-radius:13px;white-space:pre-wrap}.box{padding:14px;background:#f8fafc;border-left:4px solid #274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}@media(max-width:600px){.card{padding:18px}}</style></head><body><main class="wrap"><article class="card"><h1>조건과 실재</h1><p>칸트의 논점은 자기의식이 필요 없다는 뜻이 아닙니다. 자기의식이 인식에 필요하다는 사실에서 영혼이라는 대상의 실제 존재까지 곧바로 결론 낼 수 없다는 뜻입니다.</p><div class="flow">“나는 생각한다”가 인식에 필요하다
        ≠
‘생각하는 영혼’이 실제 대상처럼 존재한다</div><h2>세 단계로 구분하기</h2><p><strong>조건:</strong> 어떤 일이 가능하려면 필요한 것</p><p><strong>실재:</strong> 관념이 아니라 실제로 존재하는 것</p><p><strong>가능성:</strong> 실재를 확정하지도 부정하지도 않은 상태</p><div class="box"><strong>선택지 경고</strong><p>‘가능성을 열어 둔다’를 ‘실재를 보장한다’ 또는 ‘실재를 부정한다’로 바꾸면 모두 과도한 진술입니다.</p></div><button class="back" type="button" onclick="goBack()">직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
