<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>인격·자아·주관 구분</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;word-break:keep-all}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1,h2{color:#274c77}table{width:100%;border-collapse:collapse;margin:16px 0}th,td{padding:11px;border:1px solid #d8dee8;text-align:left;vertical-align:top}th{background:#eef4fb}.box{padding:14px;background:#f8fafc;border-left:4px solid #274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}@media(max-width:600px){.card{padding:18px}table{display:block;overflow:auto}}</style></head><body><main class="wrap"><article class="card"><h1>인격·자아·주관 구분</h1><table><thead><tr><th>개념</th><th>지문에서의 뜻</th><th>판단할 때 주의점</th></tr></thead><tbody><tr><td>인격</td><td>특정한 개인으로서의 인간</td><td>시간 속에서 동일한 개인인가를 묻는 중심 개념입니다.</td></tr><tr><td>자아</td><td>인격 가운데 ‘나’</td><td>스트로슨과 롱게네스는 자아 인식이 경험에서 나오는지를 다르게 봅니다.</td></tr><tr><td>주관</td><td>인식의 주체</td><td>칸트는 시간 속 복수의 주관을 같은 인격으로 인식한다고 가정합니다.</td></tr><tr><td>인식</td><td>앎</td><td>경험적 인식과 자아에 대한 인식의 관계가 학자별 쟁점입니다.</td></tr></tbody></table><div class="box"><strong>읽기 공식</strong><p>‘누가 아는가’는 주관, ‘무엇을 아는가’는 인식의 내용, ‘그 주관이 시간 뒤에도 같은 사람인가’는 인격의 통시적 동일성 문제입니다.</p></div><button class="back" type="button" onclick="goBack()">직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
