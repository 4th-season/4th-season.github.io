<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>한계와 의의</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}a{color:#245d92;font-weight:800}</style></head><body><main class="wrap"><article class="card"><h1>한계와 의의</h1><p><strong>한계</strong>는 이론이나 설명이 충분히 다루지 못한 범위입니다. <strong>의의</strong>는 그럼에도 연구와 이해에 남긴 가치입니다.</p><p>한계가 있다고 해서 이론 전체가 틀렸거나 가치가 없다는 뜻은 아닙니다. 반대로 의의가 있다고 해서 모든 현상을 설명한다는 뜻도 아닙니다.</p><p>문제에서는 ‘설명하지 못한 부분’과 ‘이미 설명한 내용’을 먼저 나누어 판단합니다.</p><p><a href="../">학습글로 돌아가기</a></p></article></main></body></html>
