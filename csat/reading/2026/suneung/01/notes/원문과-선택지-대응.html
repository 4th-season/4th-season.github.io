<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>원문과 선택지 대응</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>원문과 선택지 대응</h1><p>선택지의 핵심 주장과 지문의 근거 문장을 일대일로 대응해 판단하는 방법입니다.</p><ol><li>선택지에서 주어와 서술어를 찾습니다.</li><li>지문에서 같은 대상과 관계를 설명한 문장을 찾습니다.</li><li>범위, 조건, 인과, 정도가 달라지지 않았는지 확인합니다.</li></ol><p>비슷한 단어가 있다는 이유만으로 일치한다고 판단하지 않습니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
