<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>인과와 선후 관계</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>인과와 선후 관계</h1><p><strong>선후 관계</strong>는 어떤 일이 먼저 일어나고 다른 일이 뒤에 일어났다는 뜻입니다. <strong>인과관계</strong>는 앞의 일이 뒤의 일을 일으켰다는 뜻입니다.</p><p>앞뒤 순서가 있다는 이유만으로 원인과 결과라고 단정하면 안 됩니다. 지문에서 직접 영향이나 원인을 설명했는지 확인해야 합니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
