<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>해독과 언어 이해</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}table{width:100%;border-collapse:collapse}th,td{padding:11px;border:1px solid #d8dee8;text-align:left}th{background:#eef4fb}a{color:#245d92;font-weight:800}</style></head><body><main class="wrap"><article class="card"><h1>해독과 언어 이해</h1><p><strong>해독</strong>은 글자를 소리와 연결해 정확히 읽는 능력입니다. <strong>언어 이해</strong>는 말이나 글이 전달하는 의미와 관계를 파악하는 능력입니다.</p><table><tr><th>확인 행동</th><th>주로 판단하는 능력</th></tr><tr><td>낱말을 정확히 소리 내어 읽음</td><td>해독</td></tr><tr><td>들은 내용의 중심을 설명함</td><td>언어 이해</td></tr></table><p>한 능력의 결과만으로 다른 능력까지 단정하지 않는 것이 핵심입니다.</p><p><a href="../">학습글로 돌아가기</a></p></article></main></body></html>
