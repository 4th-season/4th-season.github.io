<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>사례 적용 문제 해결</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>사례 적용 문제 해결</h1><p>사례 적용 문제는 지문의 기준을 새로운 상황에 옮겨 판단하는 문제입니다.</p><ol><li>지문의 판단 기준을 먼저 적습니다.</li><li>사례를 행동이나 결과 단위로 나눕니다.</li><li>각 정보가 어느 기준의 근거인지 연결합니다.</li><li>사례에 없는 정보는 판단하지 않습니다.</li></ol><p>사례 전체를 한꺼번에 평가하지 않는 것이 가장 중요합니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
