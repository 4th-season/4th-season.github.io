<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>정의와 구성 요소</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>정의와 구성 요소</h1><p>정의는 개념이 무엇인지 밝히는 설명이고, 구성 요소는 그 개념을 이루는 부분입니다.</p><p>지문에서 ‘A는 B와 C로 이루어진다’와 같은 문장을 만나면 A는 전체 개념, B와 C는 구성 요소로 표시합니다.</p><p>선택지에서는 구성 요소 하나의 특징을 전체 개념의 특징으로 확대하지 않았는지 확인합니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
