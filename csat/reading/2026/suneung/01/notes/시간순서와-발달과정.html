<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>시간 순서와 발달 과정</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>시간 순서와 발달 과정</h1><p>시간 순서는 사건이나 변화가 앞뒤로 이어지는 배열입니다. 발달 과정은 시간이 지나며 능력이나 상태가 변하는 흐름입니다.</p><p>먼저 나타난 현상이 뒤의 현상을 반드시 일으켰다고 단정하면 안 됩니다. 선후 관계와 인과관계를 구분해야 합니다.</p><p>선택지에서는 단계의 순서가 바뀌었는지, 일부 단계를 생략했는지 확인합니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
