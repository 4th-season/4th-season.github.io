<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>분류 기준과 2×2표</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}table{width:100%;border-collapse:collapse}th,td{padding:11px;border:1px solid #d8dee8;text-align:left}th{background:#eef4fb}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>분류 기준과 2×2표</h1><p>두 기준이 각각 ‘충분함/부족함’처럼 두 상태를 가질 때 네 가지 조합을 만들 수 있습니다.</p><table><tr><th></th><th>언어 이해 충분</th><th>언어 이해 부족</th></tr><tr><th>해독 충분</th><td>두 능력 모두 충분</td><td>해독만 충분</td></tr><tr><th>해독 부족</th><td>언어 이해만 충분</td><td>두 능력 모두 부족</td></tr></table><p>사례의 행동을 기준별로 하나씩 넣고, 제시되지 않은 항목은 추정하지 않습니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
