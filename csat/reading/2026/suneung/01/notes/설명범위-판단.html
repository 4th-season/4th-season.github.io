<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>설명 범위 판단</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}</style></head><body><main class="wrap"><article class="card"><h1>설명 범위 판단</h1><p>지문이 실제로 설명한 범위와 설명하지 않은 범위를 구분하는 읽기입니다.</p><ol><li>핵심 개념과 조건을 표시합니다.</li><li>지문이 직접 다룬 대상만 목록으로 만듭니다.</li><li>선택지가 새로운 대상·원인·결과를 추가하지 않았는지 확인합니다.</li></ol><p>지문에 없는 내용이 상식적으로 타당해 보여도 정답 근거가 되지는 않습니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
