<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>채권 발생 예약 | 수능 독서 Note</title><link rel="canonical" href="https://4th-season.com/csat/reading/2021/suneung/26/notes/claim-based-reservation.html"></head><body><main><p><a href="../">본문으로 돌아가기</a></p><h1>채권 발생 예약</h1><p>예약상 권리자가 본계약 체결을 요구하면 상대방이 승낙해야 본계약이 성립하는 유형입니다.</p><h2>예약상 급부</h2><p>상대방의 승낙이 예약상 급부입니다.</p><h2>본계약상 급부와 구별</h2><p>물품 인도, 서비스 제공, 대금 지급은 본계약이 성립한 뒤 발생합니다.</p><details><summary>확인 문제</summary><p>채권 발생 예약에서 예약상 급부는 무엇인가?</p><p><strong>정답:</strong> 본계약 체결 요구에 대한 상대방의 승낙.</p></details></main></body></html>
