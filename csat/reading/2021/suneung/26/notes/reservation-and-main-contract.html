<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>예약과 본계약 | 수능 독서 Note</title><link rel="canonical" href="https://4th-season.com/csat/reading/2021/suneung/26/notes/reservation-and-main-contract.html"></head><body><main><p><a href="../">본문으로 돌아가기</a></p><h1>예약과 본계약</h1><p>예약은 장래에 본계약을 체결하기 위한 별도의 계약입니다.</p><h2>핵심 순서</h2><p>예약 체결 → 예약상 권리와 의무 발생 → 본계약 성립 → 본계약상 급부 발생</p><h2>혼동하기 쉬운 점</h2><p>예약이 체결되었다고 곧바로 본계약상 급부가 발생하는 것은 아닙니다.</p><details><summary>확인 문제</summary><p>예약만 체결된 상태에서 본계약상 대금 지급 의무가 바로 생기는가?</p><p><strong>정답:</strong> 아니다.</p></details></main></body></html>
