<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>예약 완결권 | 수능 독서 Note</title><link rel="canonical" href="https://4th-season.com/csat/reading/2021/suneung/26/notes/reservation-completion-right.html"></head><body><main><p><a href="../">본문으로 돌아가기</a></p><h1>예약 완결권</h1><p>권리자가 일방적으로 의사를 표시하면 상대방의 승낙 없이 본계약이 성립하는 권리입니다.</p><h2>채권과의 차이</h2><p>상대방의 행동을 요구하는 채권이 아니라 법률관계를 직접 바꾸는 형성권입니다.</p><h2>예약상 급부</h2><p>상대방의 승낙 의무가 없으므로 예약상 급부도 없습니다.</p><details><summary>확인 문제</summary><p>예약 완결권 행사에 상대방의 승낙이 필요한가?</p><p><strong>정답:</strong> 필요하지 않다.</p></details></main></body></html>
