<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>읽기 전 활동의 효과</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;word-break:keep-all}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1,h2{color:#274c77}.box{padding:14px;border:1px solid #d8dee8;border-radius:12px;margin:12px 0;background:#f8fafc}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}@media(max-width:560px){.card{padding:18px}}</style></head><body><main class="wrap"><article class="card"><h1>읽기 전 활동의 효과</h1><p>훑어보기와 질문하기는 본격적으로 읽기 전에 독자가 글의 방향과 읽는 목적을 세우게 합니다.</p><div class="box"><h2>훑어보기</h2><p><strong>대강의 내용 파악 → 중점 내용 발견·배경지식 활성화 → 글에 대한 적응력 향상 → 읽기 속도와 기억 향상</strong></p></div><div class="box"><h2>질문하기</h2><p><strong>읽는 목적에 맞는 질문 생성 → 답을 찾으며 집중 → 중요 내용 선별 → 기억과 회상 향상</strong></p></div><p>타인이 제공한 질문도 효과가 있지만, 스스로 만든 질문을 활용하면 독자의 능동성이 더욱 강화됩니다. 문제에서는 이 비교의 정도를 바꾸는 선택지를 주의해야 합니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
