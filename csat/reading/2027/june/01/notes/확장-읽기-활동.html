<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>확장 읽기 활동</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;word-break:keep-all}.wrap{width:min(760px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 26px rgba(31,41,55,.08)}h1{color:#274c77}table{width:100%;border-collapse:collapse}th,td{padding:11px;border:1px solid #d8dee8;text-align:left;vertical-align:top}th{background:#eef4fb}.back{border:0;border-radius:10px;padding:11px 15px;background:#274c77;color:#fff;font:inherit;font-weight:800;cursor:pointer}@media(max-width:560px){.card{padding:18px}table{display:block;overflow:auto}}</style></head><body><main class="wrap"><article class="card"><h1>확장 읽기 활동</h1><p>SQ3R에 추가된 활동은 글을 분석하고 깊이 이해하는 과정을 보완합니다.</p><table><tr><th>구분</th><th>관점 바꾸기</th><th>숙고하기</th></tr><tr><th>시점</th><td>글을 읽는 중</td><td>글을 읽은 뒤</td></tr><tr><th>기준</th><td>저자의 입장</td><td>독자의 배경지식</td></tr><tr><th>행동</th><td>순서와 전달 방법을 어떻게 구성할지 생각한다.</td><td>배경지식과 이해한 내용을 연결한다.</td></tr><tr><th>효과</th><td>분석적으로 읽는다.</td><td>깊이 있게 이해한다.</td></tr></table><p>‘저자가 의도한 대로 수동적으로 정리하기’는 관점 바꾸기가 아닙니다. 저자의 입장에서 구성 선택을 능동적으로 검토해야 합니다.</p><button class="back" type="button" onclick="goBack()">← 직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='../'}}</script></body></html>
