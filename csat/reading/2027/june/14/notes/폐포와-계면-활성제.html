<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>폐포와 계면 활성제 | 개념 Note</title><style>:root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--line:#d8dee8;--primary:#274c77;--soft:#eef4fb;--accent:#d97706}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;word-break:keep-all}.wrap{width:min(860px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px}h1,h2{color:var(--primary)}.flow,.point{padding:16px;border-radius:12px;margin:14px 0}.flow{background:#172235;color:#fff;white-space:pre-wrap}.point{background:var(--soft);border-left:4px solid var(--accent)}.back{border:0;border-radius:10px;padding:11px 15px;background:var(--primary);color:#fff;font:inherit;font-weight:800}@media(max-width:650px){.card{padding:18px}.back{width:100%}}</style></head><body><main class="wrap"><article class="card"><p>14～17번 개념 Note</p><h1>폐포와 계면 활성제</h1><h2>공기가 드나드는 조건</h2><p>폐포 내부 압력과 인체 외부 공기의 압력에 차이가 생기면 공기가 높은 압력에서 낮은 압력으로 이동합니다.</p><h2>표면 장력과 계면 활성제</h2><div class="flow">폐포를 둘러싼 액체층의 표면 장력
→ 폐포를 수축시키는 압력으로 작용
→ 지질과 단백질로 구성된 계면 활성제 분비
→ 액체층의 표면 장력 감소
→ 폐포 확장이 쉬워짐</div><div class="point"><strong>선택지 함정</strong><p>지질이 홀로 폐포의 수축 압력을 낮추는 것이 아닙니다. 지질은 표면 장력을 낮추는 계면 활성제의 구성 성분 중 하나입니다.</p></div><button class="back" type="button" onclick="goBack()">직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1)history.back();else location.href='../'}</script></body></html>
