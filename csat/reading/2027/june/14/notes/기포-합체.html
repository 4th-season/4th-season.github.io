<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>기포 합체 | 개념 Note</title><style>:root{--bg:#f5f7fb;--text:#1f2937;--line:#d8dee8;--primary:#274c77;--soft:#eef4fb;--accent:#d97706}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;word-break:keep-all}.wrap{width:min(860px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px}h1,h2{color:var(--primary)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.box,.point{padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--soft)}.point{margin:16px 0;border-left:4px solid var(--accent)}.back{border:0;border-radius:10px;padding:11px 15px;background:var(--primary);color:#fff;font:inherit;font-weight:800}@media(max-width:650px){.card{padding:18px}.grid{grid-template-columns:1fr}.back{width:100%}}</style></head><body><main class="wrap"><article class="card"><p>14～17번 개념 Note</p><h1>크기가 다른 두 기포의 합체</h1><div class="grid"><div class="box"><strong>작은 기포</strong><p>반지름이 작으므로 내부와 외부의 압력 차가 큽니다.</p></div><div class="box"><strong>큰 기포</strong><p>반지름이 크므로 내부와 외부의 압력 차가 작습니다.</p></div></div><h2>공기 이동과 합체 결과</h2><p>공기는 압력이 높은 작은 기포에서 압력이 낮은 큰 기포로 이동합니다. 합체하여 생긴 기포는 처음의 큰 기포보다도 반지름이 큽니다. 따라서 새 기포의 내부와 외부의 압력 차는 처음의 큰 기포보다 작습니다.</p><div class="point"><strong>15번 판단 핵심</strong><p>‘합체 후 더 큰 기포’와 ‘압력 차는 반지름에 반비례’를 바로 연결하면 됩니다.</p></div><button class="back" type="button" onclick="goBack()">직전 화면으로 돌아가기</button></article></main><script>function goBack(){if(document.referrer&&history.length>1)history.back();else location.href='../'}</script></body></html>
