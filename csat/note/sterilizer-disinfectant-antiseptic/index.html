   └─ 소독제: 독성이 비교적 약해 피부·상처에 사용 가능</div><h2>헷갈리기 쉬운 점</h2><p>소독제는 감염방지제와 나란한 별도 범주가 아니라 감염방지제 안에 포함됩니다. 또한 소독제도 사람의 세포막을 손상시킬 수 있으므로 눈이나 호흡기 점막에 닿지 않도록 해야 합니다.</p><p><a href="/csat/reading/2021/september/34/">34～37번 학습 페이지로 돌아가기</a></p></article></main></body></html>
