<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>실학자의 지식관 | 수능 국어 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}a{color:#245d92}.box{padding:14px 16px;background:#eef4fb;border-left:4px solid #274c77;border-radius:12px}</style></head><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 Note</a></p><h1>실학자의 지식관</h1><p>실학자의 지식관은 기존 지식을 버리는 태도라기보다, 현실 문제를 설명하고 개선하는 데 필요한 지식을 더 넓게 모으고 검토하려는 태도에 가깝습니다.</p><h2>핵심 변화</h2><div class="box">발췌 → 재분류<br>기록 → 평가<br>개인적 활용 → 지식 제공과 확산<br>관념 중심 → 객관적 사실 탐구</div><h2>읽기 주의점</h2><p>‘주자학을 이어받는 한편 새로운 지식을 수용했다’는 표현은 계승과 변화가 함께 있음을 뜻합니다. 한쪽만 강조하면 선택지 판단을 그르치기 쉽습니다.</p><p><a href="/csat/reading/2023/suneung/04/">2023학년도 수능 4～9번으로 돌아가기</a></p></article></main></body></html>
