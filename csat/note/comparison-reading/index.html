<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>인물 비교 읽기 | 수능 국어 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}a{color:#245d92}.box{padding:14px 16px;background:#eef4fb;border-left:4px solid #274c77;border-radius:12px}</style></head><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 Note</a></p><h1>인물 비교 읽기</h1><p>여러 사상가나 학자를 비교하는 지문은 이름과 주장만 암기하는 방식보다 공통된 비교 기준을 먼저 세우는 것이 효과적입니다.</p><h2>세 가지 비교축</h2><div class="box">① 무엇을 받아들였는가<br>② 기존 입장과 어떤 관계를 맺었는가<br>③ 어디에 활용했는가</div><h2>선택지 검토</h2><p>선택지에 나온 인물과 행동을 표의 같은 열에 놓고 비교합니다. 한 인물의 특징을 다른 인물에게 옮겨 붙인 선택지가 자주 오답이 됩니다.</p><p><a href="/csat/reading/2023/suneung/04/">2023학년도 수능 4～9번으로 돌아가기</a></p></article></main></body></html>
