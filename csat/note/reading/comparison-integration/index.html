<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>관점 비교와 통합 | 수능 국어 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 24px #0001}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 아카이브</a></p><h1>관점 비교와 통합</h1><p>여러 관점의 글을 함께 읽을 때는 공통점과 차이점을 나누고, 각 관점의 근거와 설명 범위를 검토한 뒤 자신의 판단을 다시 구성해야 합니다.</p><div class="box"><strong>비교 기준</strong><p>문제 정의 · 핵심 주장 · 근거 · 전제 · 해결 방법 · 설명하지 못하는 지점</p></div><h2>통합의 뜻</h2><p>통합은 여러 주장을 섞는 일이 아닙니다. 평가한 내용을 바탕으로 더 타당한 관계를 만들고 자신의 관점을 발전시키는 과정입니다.</p></article></main></body></html>
