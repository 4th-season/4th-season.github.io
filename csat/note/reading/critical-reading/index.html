<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>비판적 독서 | 수능 국어 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 24px #0001}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 아카이브</a></p><h1>비판적 독서</h1><p>비판적 독서는 정보를 부정하는 읽기가 아니라, 정보의 근거·관점·타당성을 확인해 문제 해결에 쓸 수 있는지를 판단하는 읽기입니다.</p><div class="box"><strong>판단 순서</strong><p>문제 확인 → 관련 정보 수집 → 관점 비교 → 근거와 타당성 검토 → 평가 내용 통합 → 관점 재구성</p></div><h2>오답이 자주 만드는 왜곡</h2><p>비판적 판단을 ‘유보한다’, 여러 관점을 ‘그대로 받아들인다’, 자신의 관점을 ‘고정한다’는 진술은 비판적 독서의 방향과 어긋납니다.</p></article></main></body></html>
