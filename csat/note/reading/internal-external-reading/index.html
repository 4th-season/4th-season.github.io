<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>내면과 외부 세계 읽기 | 수능 국어 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 24px #0001}h1,h2{color:#274c77}.box{padding:14px 16px;border-radius:12px;background:#eef4fb;margin:14px 0}a{color:#245d92}</style><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 아카이브</a></p><h1>내면과 외부 세계 읽기</h1><p>독서는 자기 내면을 돌아보게 하는 활동이면서 동시에 현실을 이해하고 문제 해결의 실마리를 찾게 하는 활동입니다.</p><div class="box"><strong>두 방향</strong><p>내면으로의 여행: 삶의 숙고·자기 성찰·내면 성장<br>외부 세계로의 확장: 현실 인식·정보 판단·문제 해결</p></div><h2>문제 풀이 기준</h2><p>한 선택지가 독서를 개인 성장으로만 제한하거나, 반대로 현실 문제 해결로만 제한하면 글의 두 방향을 모두 반영했는지 확인해야 합니다.</p></article></main></body></html>
