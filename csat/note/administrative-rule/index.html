<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>행정규칙 | 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p>수능 독서 Note</p><h1>행정규칙</h1><p>행정부 내부의 직제나 사무 처리 절차를 정하는 규칙입니다. 일반 국민에게 직접 적용되지 않는 것이 원칙이지만, 첨단 기술처럼 불가피한 경우 행정 규제 사항을 정하는 예외가 있습니다.</p><h2>확인 질문</h2><p>일반 국민에게 직접 적용되는가? 입법예고와 공포가 필요한가? 예외적으로 규제 사항을 정하는 조건은 무엇인가?</p><p><a href="/csat/reading/2021/september/26/">지문으로 돌아가기</a></p></article></main></body></html>
