<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>예술 정의 이론 | 모방론·표현론·형식론</title><style>body{max-width:820px;margin:40px auto;padding:0 18px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:14px;background:#f8fafc;margin:16px 0}a{color:#245d92}</style></head><body><a href="/csat/reading/2021/september/20/">← 지문으로 돌아가기</a><h1>예술 정의 이론</h1><p>예술 정의 이론은 작품의 공통 본질이나 필요충분조건을 찾으려는 시도입니다.</p><div class="box"><h2>모방론</h2><p>자연의 대상을 닮게 재현하는 것을 예술의 핵심으로 봅니다.</p></div><div class="box"><h2>표현론</h2><p>예술가의 진지한 관념과 감정이 표현되었는지를 중시합니다.</p></div><div class="box"><h2>형식론</h2><p>미적 정서를 일으키는 ‘의미 있는 형식’을 예술의 기준으로 봅니다.</p></div><p>세 이론은 각각 재현, 작가의 마음, 작품의 형식에 초점을 둡니다.</p></body></html>
