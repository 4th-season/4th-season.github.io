<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>기초 대사량 | 수능 국어 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}.box{padding:14px 16px;background:#eef4fb;border-left:4px solid #274c77;border-radius:12px}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 Note</a></p><h1>기초 대사량</h1><div class="box">쾌적한 온도에서 편히 쉬는 공복 상태의 동물이 생존을 위해 소비하는 최소 에너지량입니다.</div><h2>직접법</h2><p>호흡실에서 체외로 발산되는 열량을 열량계로 직접 측정합니다.</p><h2>간접법</h2><p>산소 소비량과 이산화 탄소 배출량을 측정해 체내 생성 열량을 추정합니다.</p><h2>읽기 포인트</h2><p>측정하는 대상은 다르지만 일정한 체온에서는 생성 열량과 발산 열량이 같으므로 두 방법 모두 기초 대사량을 구할 수 있습니다.</p></article></main></body></html>
