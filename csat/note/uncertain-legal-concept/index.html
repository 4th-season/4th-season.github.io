<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>불확정 개념 | 수능 독서 Note</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;max-width:820px;margin:40px auto;padding:0 20px;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border-radius:12px;background:#eef4fb;margin:18px 0}</style></head><body><a href="/csat/area/reading/">독서 아카이브</a><h1>불확정 개념</h1><p>문언만으로 의미가 하나로 고정되지 않고, 구체적 상황을 고려해야 적용 의미가 정해지는 법률 개념입니다.</p><div class="box"><strong>읽기 기준</strong><p>불확정 개념이 보이면 ① 어떤 상황을 고려하는지 ② 누가 판단하는지 ③ 판단 결과로 어떤 효과가 생기는지 확인합니다.</p></div><h2>주의</h2><p>불확정 개념이 사용되었다고 해서 모든 행정 작용이 반드시 재량 행위가 되는 것은 아닙니다. 지문의 ‘대개’ 같은 범위 표현을 보존해야 합니다.</p></body></html>
