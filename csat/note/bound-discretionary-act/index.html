<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>기속 행위와 재량 행위 | 수능 독서 Note</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;max-width:820px;margin:40px auto;padding:0 20px;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border-radius:12px;background:#eef4fb;margin:18px 0}</style></head><body><a href="/csat/area/reading/">독서 아카이브</a><h1>기속 행위와 재량 행위</h1><div class="box"><strong>기속 행위</strong><p>법령의 요건이 충족되면 행정청이 정해진 내용의 행정 작용을 반드시 해야 합니다.</p></div><div class="box"><strong>재량 행위</strong><p>법령의 요건이 충족되어도 행정 작용의 구체적 내용을 행정청이 선택할 수 있습니다.</p></div><h2>문장 판단법</h2><p>‘반드시 해야 한다’는 기속, ‘구체적 내용을 고를 수 있다’는 재량의 신호입니다. 요건 충족 여부와 효과 선택 가능성을 분리해 읽습니다.</p></body></html>
