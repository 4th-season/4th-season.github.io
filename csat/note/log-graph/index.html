<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>L-그래프 | 수능 국어 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;background:#eef4fb;border-left:4px solid #274c77;border-radius:12px}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 Note</a></p><h1>L-그래프</h1><div class="box">두 변수에 상용로그를 취해 곡선 관계를 직선 관계로 바꾸어 증가율을 비교하는 그래프입니다.</div><h2>기울기 읽기</h2><p>기울기 1은 두 변수의 증가율이 같음을, 1보다 작으면 세로축 변수의 증가율이 더 작음을 뜻합니다.</p><h2>주의</h2><p>기울기는 두 증가율의 단순한 차이가 아닙니다. 선택지에서 ‘차이와 동일하다’고 바꾸면 틀릴 가능성이 큽니다.</p></article></main></body></html>
