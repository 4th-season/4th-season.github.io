<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>예술 제도론 | 감상 후보 자격과 예술계</title><style>body{max-width:820px;margin:40px auto;padding:0 18px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:14px;background:#f8fafc;margin:16px 0}a{color:#245d92}</style></head><body><a href="/csat/reading/2021/september/20/">← 지문으로 돌아가기</a><h1>예술 제도론</h1><p>디키의 제도론은 작품의 외형이나 우수성보다 예술계의 사회적 절차를 중심으로 예술을 설명합니다.</p><div class="box"><h2>핵심 조건</h2><p>인공물이 예술계에 속한 사람들에 의해 감상의 후보 자격을 부여받았는가를 봅니다.</p></div><div class="box"><h2>분류와 평가의 차이</h2><p>제도론은 작품이 훌륭한지를 평가하는 이론이 아니라, 무엇을 예술 작품으로 분류할지를 설명하는 이론입니다.</p></div><p>뒤샹의 『샘』처럼 일반 사물과 형식적으로 같은 대상이 왜 예술이 되는지 설명하는 데 유용합니다.</p></body></html>
