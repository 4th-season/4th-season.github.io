<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>최소 제곱법 | 수능 국어 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;background:#eef4fb;border-left:4px solid #274c77;border-radius:12px}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 Note</a></p><h1>최소 제곱법</h1><div class="box">각 점과 후보 직선 사이 편차를 제곱해 더한 값이 가장 작은 직선을 선택하는 방법입니다.</div><h2>왜 제곱하는가</h2><p>양수와 음수 편차가 서로 상쇄되는 것을 막고, 큰 편차에 더 큰 영향을 주기 위해서입니다.</p><h2>선택지 판단</h2><p>점이 직선에서 멀어질수록 편차 제곱 합은 커집니다. ‘멀수록 더 작다’는 진술은 방향을 뒤집은 것입니다.</p></article></main></body></html>
