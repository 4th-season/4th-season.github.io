<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>예술 비평 방법 | 맥락주의·형식주의·인상주의</title><style>body{max-width:820px;margin:40px auto;padding:0 18px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;color:#1f2937}h1,h2{color:#274c77}.box{padding:16px;border:1px solid #d8dee8;border-radius:14px;background:#f8fafc;margin:16px 0}a{color:#245d92}</style></head><body><a href="/csat/reading/2021/september/20/">← 지문으로 돌아가기</a><h1>세 가지 예술 비평 방법</h1><div class="box"><h2>맥락주의</h2><p>시대·사회·정치·경제·문화·작가의 심리와 이념, 작품의 사회적 효과를 함께 봅니다.</p></div><div class="box"><h2>형식주의</h2><p>선·색·형태와 비례·율동·강조 같은 조형 요소와 원리의 구조를 봅니다.</p></div><div class="box"><h2>인상주의</h2><p>객관적 규칙보다 비평가 자신의 생각·느낌·상상력을 중시합니다.</p></div><p>같은 작품도 어떤 비평 방법을 택하느냐에 따라 의미와 가치 판단이 달라질 수 있습니다.</p></body></html>
