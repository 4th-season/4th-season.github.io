<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>포괄적 위임 | 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p>수능 독서 Note</p><h1>포괄적 위임</h1><p>법률이 위임할 사항의 범위를 구체적으로 정하지 않은 채 다른 기관에 맡기는 것입니다. 위임명령에서는 삼권 분립 원칙 때문에 금지되지만, 조례에는 상대적으로 넓은 위임이 허용될 수 있습니다.</p><h2>확인 질문</h2><p>위임 범위가 예측 가능하게 정해져 있는가? 위임명령과 조례에 같은 기준이 적용되는가?</p><p><a href="/csat/reading/2021/september/26/">지문으로 돌아가기</a></p></article></main></body></html>
