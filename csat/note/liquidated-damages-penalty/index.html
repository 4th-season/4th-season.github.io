<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>손해 배상 예정액과 위약벌 | 수능 독서 Note</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;max-width:820px;margin:40px auto;padding:0 20px;color:#1f2937}h1,h2{color:#274c77}table{width:100%;border-collapse:collapse}th,td{border:1px solid #d8dee8;padding:12px;text-align:left}th{background:#eef4fb}</style></head><body><a href="/csat/area/reading/">독서 아카이브</a><h1>손해 배상 예정액과 위약벌</h1><table><tr><th>구분</th><th>핵심</th></tr><tr><td>손해 배상 예정액</td><td>손해액을 증명하지 않아도 약정액을 청구할 수 있고, 부당히 과다하면 법원이 감액할 수 있습니다.</td></tr><tr><td>위약벌</td><td>계약 위반에 대한 제재입니다. 법원이 감액할 수 없고, 손해액을 증명하면 손해 배상금도 별도로 청구할 수 있습니다.</td></tr></table><h2>문제 풀이 순서</h2><p>① 위약금의 성격이 증명되었는지 ② 실제 손해액이 증명되었는지 ③ 법원 감액이 가능한지 차례로 확인합니다.</p></body></html>
