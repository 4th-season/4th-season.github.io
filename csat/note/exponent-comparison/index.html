<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>지수 비교 읽기 | 수능 국어 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px}h1,h2{color:#274c77}.box{padding:14px 16px;background:#eef4fb;border-left:4px solid #274c77;border-radius:12px}a{color:#245d92}</style></head><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 Note</a></p><h1>지수 비교 읽기</h1><div class="box">같은 밑이 1보다 클 때 지수가 클수록 값의 증가폭도 큽니다.</div><h2>0.67과 0.75</h2><p>체중이 같은 비율로 증가한다면 (체중)<sup>0.75</sup>의 증가율이 (체중)<sup>0.67</sup>보다 큽니다.</p><h2>문해력 포인트</h2><p>두 지수가 모두 1보다 작다는 사실과, 둘 중 어느 쪽이 더 큰지를 동시에 봐야 합니다. 둘 다 체중 증가율보다는 작지만 0.75 쪽이 더 크게 증가합니다.</p></article></main></body></html>
