<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>서학 수용 방식 | 수능 국어 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.wrap{width:min(820px,calc(100% - 24px));margin:32px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:26px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}a{color:#245d92}table{width:100%;border-collapse:collapse}th,td{padding:11px;border:1px solid #d8dee8;text-align:left;vertical-align:top}th{background:#eef4fb}</style></head><body><main class="wrap"><article class="card"><p><a href="/csat/area/reading/">독서 Note</a></p><h1>서학 수용 방식</h1><p>서학을 받아들였다는 사실만으로 인물들의 태도가 같다고 볼 수는 없습니다. 무엇을, 왜, 어떤 기준으로 활용했는지 구분해야 합니다.</p><table><tr><th>인물</th><th>수용 방식</th></tr><tr><td>이수광</td><td>서양 관련 지식을 객관적으로 소개</td></tr><tr><td>이익</td><td>기존 학설을 정당화하거나 배제하는 근거로 활용</td></tr><tr><td>이규경</td><td>중국의 서학 연구서를 폭넓게 참고해 체계적으로 정리</td></tr></table><h2>선택지 판단 기준</h2><p>수용 여부, 기존 사상과의 관계, 활용 목적을 따로 확인합니다. ‘받아들였다’가 곧 ‘기존 관념에서 완전히 벗어났다’는 뜻은 아닙니다.</p><p><a href="/csat/reading/2023/suneung/04/">2023학년도 수능 4～9번으로 돌아가기</a></p></article></main></body></html>
