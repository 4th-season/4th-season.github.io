<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>위임명령 | 수능 독서 Note</title><style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8}.page{width:min(820px,calc(100% - 24px));margin:30px auto}.card{background:#fff;border:1px solid #d8dee8;border-radius:18px;padding:28px;box-shadow:0 8px 28px rgba(31,41,55,.08)}h1,h2{color:#274c77}a{color:#245d92}</style></head><body><main class="page"><article class="card"><p>수능 독서 Note</p><h1>위임명령</h1><p>국회가 법률로 범위를 정해 행정부에 위임하고, 행정부가 그 범위 안에서 제정하는 명령입니다. 포괄적 위임은 허용되지 않으며 위임 범위를 벗어나면 효력이 없습니다.</p><h2>확인 질문</h2><p>위임 범위가 법률에 구체적으로 정해져 있는가? 법률 어구의 의미를 확대하거나 축소하지 않았는가?</p><p><a href="/csat/reading/2021/september/26/">지문으로 돌아가기</a></p></article></main></body></html>
