<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>재량 준칙과 평등 원칙 | 수능 독서 Note</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;max-width:820px;margin:40px auto;padding:0 20px;color:#1f2937}h1,h2{color:#274c77}.flow{padding:16px;border-radius:12px;background:#172235;color:#fff;white-space:pre-wrap}</style></head><body><a href="/csat/area/reading/">독서 아카이브</a><h1>재량 준칙과 평등 원칙</h1><p>재량 준칙은 행정청이 재량 행사의 기준을 명확히 하기 위해 스스로 정한 기준입니다. 법령은 아니므로 그 자체가 곧 법규처럼 작동하지는 않습니다.</p><div class="flow">재량 준칙에 따른 적법한 행정 작용 반복
→ 행정 관행 형성
→ 같은 요건이 다시 충족
→ 평등 원칙 때문에 동일한 내용의 작용 필요</div><h2>핵심 구분</h2><p>‘법령이 아니다’와 ‘아무 구속력도 없다’는 같은 말이 아닙니다. 반복된 적법한 선례가 있는지 확인해야 합니다.</p></body></html>
